        <p style={{ color: 'rgba(245,237,227,0.65)', fontSize: 15, margin: 0, lineHeight: 1.65, maxWidth: 270 }}>Controle suas aplicações, acompanhe seu progresso e transforme sua jornada.</p>
      </div>
      {/* Cards de features — fundo cream */}
      <div style={{ background: 'var(--cream-light)', padding: '24px 24px 0' }}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {[{ iconName: 'syringe', t: 'Lembretes de aplicação semanais' }, { iconName: 'scale', t: 'Histórico de peso e metas' }, { iconName: 'message-circle', t: 'Assistente Rê sempre disponível' }].map(f => (
            <div key={f.t} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 16px', background: 'white', borderRadius: 12, border: '1px solid rgba(196,136,90,0.15)', boxShadow: '0 1px 6px rgba(45,31,20,0.05)', textAlign: 'left' }}>
              <div style={{ width: 38, height: 38, borderRadius: 10, background: 'var(--copper-pale)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                <Icon name={f.iconName} size={20} color="var(--copper)" strokeWidth={1.8} />
              </div>
              <span style={{ color: 'var(--brown)', fontSize: 13, fontWeight: 600 }}>{f.t}</span>
            </div>
          ))}
        </div>
      </div>
      <div style={{ padding: '20px 24px 40px', background: 'var(--cream-light)', borderTop: 'none' }}>
        <button className="btn-primary" onClick={next}>Começar →</button>
      </div>
    </Wrap>
  );

  /* ── Step 1: Status ── */
  if (step === 1) return (
    <Wrap>
      <OBHeader title="Pronto para começar sua jornada?" subtitle="Onde você está no tratamento GLP-1?" />
      <div style={{ flex: 1, padding: '20px 24px', display: 'flex', flexDirection: 'column', gap: 12, overflowY: 'auto' }}>
        <OptionRow selected={dados.status === 'usando'} onClick={() => set('status', 'usando')} iconName="syringe-dot" label="Já estou usando GLP-1" sublabel="Tenho histórico de aplicações" />
        <OptionRow selected={dados.status === 'iniciando'} onClick={() => set('status', 'iniciando')} iconName="play-btn" label="Quero começar com GLP-1" sublabel="Ainda não iniciei o tratamento" />
      </div>
      <OBFooter onPress={next} disabled={!dados.status} />
    </Wrap>
  );

  /* ── Step 2: Nome ── */
  if (step === 2) return (
    <Wrap>
      <OBHeader title="Como podemos te chamar?" subtitle="Seu nome personaliza a sua experiência no app" />
      <div style={{ flex: 1, padding: '20px 24px', overflowY: 'auto' }}>
        <input value={dados.nome} onChange={e => set('nome', e.target.value)}
          placeholder="Seu primeiro nome" autoFocus
          style={{ width: '100%', padding: '16px 18px', borderRadius: 14, fontSize: 18, border: `2px solid ${dados.nome ? 'var(--copper)' : 'rgba(45,31,20,0.12)'}`, background: 'white', color: 'var(--brown)', fontFamily: 'inherit', fontWeight: 600, outline: 'none', transition: 'border-color .2s', boxSizing: 'border-box', boxShadow: '0 1px 4px rgba(45,31,20,0.05)' }} />
        <p style={{ color: 'var(--brown-light)', fontSize: 12, margin: '12px 0 0', lineHeight: 1.5, opacity: 0.7 }}>🔒 Seus dados ficam apenas no seu aparelho</p>
      </div>
      <OBFooter onPress={next} disabled={!dados.nome.trim()} />
    </Wrap>
  );

  /* ── Step 3: Medicamento ── */
  if (step === 3) return (
    <Wrap>
      <OBHeader title="Qual medicamento GLP-1 você usa?" subtitle="Se não estiver listado, escolha 'Outro'" />
      <div style={{ flex: 1, padding: '16px 24px', display: 'flex', flexDirection: 'column', gap: 10, overflowY: 'auto' }}>
        {medicamentos.map(m => (
          <OptionRow key={m.id} selected={dados.medicamento === m.id} onClick={() => set('medicamento', m.id)} iconName="med-bottle" label={m.label} sublabel={m.sub} />
        ))}
      </div>
      <OBFooter onPress={next} disabled={!dados.medicamento} />
    </Wrap>
  );

  /* ── Step 4: Concentração da ampola ── */
  if (step === 4) return (
    <Wrap>
      <OBHeader title="Qual a concentração da sua ampola?" subtitle="Verifique no frasco ou na receita médica" />
      <div style={{ flex: 1, padding: '16px 24px', display: 'flex', flexDirection: 'column', gap: 8, overflowY: 'auto' }}>
        {/* Dica visual */}
        <div style={{ background: 'linear-gradient(135deg, rgba(196,136,90,0.12), rgba(196,136,90,0.05))', borderRadius: 14, padding: '12px 14px', border: '1px solid rgba(196,136,90,0.25)', display: 'flex', gap: 10, alignItems: 'flex-start', marginBottom: 4 }}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--copper)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0, marginTop: 1 }}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <p style={{ color: 'var(--brown-light)', fontSize: 12.5, margin: 0, lineHeight: 1.5 }}>
            A concentração fica impressa no frasco. Exemplo: <strong style={{ color: 'var(--brown)' }}>10mg/ml</strong> significa que cada ml contém 10mg do medicamento.
          </p>
        </div>
        {concentracoesAtivas.map(c => (
          <button key={c.val} onClick={() => set('concentracaoAmpola', c.val)}
            style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 14, padding: '13px 16px', borderRadius: 14,
              border: `2px solid ${dados.concentracaoAmpola === c.val ? 'var(--copper)' : 'rgba(45,31,20,0.1)'}`,
              background: dados.concentracaoAmpola === c.val ? 'rgba(196,136,90,0.08)' : 'white',
              cursor: 'pointer', textAlign: 'left', transition: 'all .15s',
              boxShadow: dados.concentracaoAmpola === c.val ? '0 2px 10px rgba(196,136,90,0.18)' : '0 1px 3px rgba(45,31,20,0.04)' }}>
            {/* Ícone de frasco */}
            <div style={{ width: 40, height: 40, borderRadius: 11, flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center',
              background: dados.concentracaoAmpola === c.val ? 'rgba(196,136,90,0.15)' : '#F5F0EC', transition: 'background .15s' }}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={dados.concentracaoAmpola === c.val ? 'var(--copper)' : '#9A8070'} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
                <rect x="9" y="1" width="6" height="4" rx="1.5"/><rect x="5" y="5" width="14" height="18" rx="3"/>
                <line x1="12" y1="10" x2="12" y2="16"/><line x1="9" y1="13" x2="15" y2="13"/>
              </svg>
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 700, color: 'var(--brown)', fontSize: 15 }}>{c.label}</div>
              {c.val !== 'nao-sei' && <div style={{ fontSize: 11.5, color: '#9A8070', marginTop: 2, fontFamily: 'monospace', letterSpacing: '0.1px' }}>{c.sub}</div>}
              {c.val === 'nao-sei' && <div style={{ fontSize: 12, color: '#9A8070', marginTop: 2 }}>Você pode ajustar depois no perfil</div>}
            </div>
            <div style={{ width: 22, height: 22, borderRadius: '50%', flexShrink: 0,
              border: `2px solid ${dados.concentracaoAmpola === c.val ? 'var(--copper)' : 'rgba(45,31,20,0.18)'}`,
              background: dados.concentracaoAmpola === c.val ? 'var(--copper)' : 'transparent',
              display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all .15s' }}>
              {dados.concentracaoAmpola === c.val && <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>}
            </div>
          </button>
        ))}
      </div>
      <OBFooter onPress={next} disabled={!dados.concentracaoAmpola} />
    </Wrap>
  );

  /* ── Step 5: Dose ── */
  if (step === 5) return (
    <Wrap>
      <OBHeader title="Qual é a sua dosagem?" subtitle="Escolha a dose que você usa ou quer usar" />
      <div style={{ flex: 1, padding: '16px 24px', display: 'flex', flexDirection: 'column', gap: 10, overflowY: 'auto' }}>
        {doses.map(d => (
          <OptionRow key={d} selected={dados.dose === d} onClick={() => set('dose', d)} iconName="hourglass" label={d} />
        ))}
      </div>
      <OBFooter onPress={next} />
    </Wrap>
  );

  /* ── Step 6: Data início ── */
  if (step === 6) return (
    <Wrap>
      <OBHeader title="Quando foi sua primeira aplicação?" subtitle="Calculamos sua janela semanal a partir desta data" />
      <div style={{ flex: 1, padding: '20px 24px', overflowY: 'auto' }}>
        <input type="date" value={dados.dataInicio} onChange={e => set('dataInicio', e.target.value)}
          max={new Date().toISOString().split('T')[0]}
          style={{ width: '100%', padding: '16px', borderRadius: 14, fontSize: 16, border: '2px solid var(--copper)', background: 'white', color: 'var(--brown)', fontFamily: 'inherit', outline: 'none', boxSizing: 'border-box', boxShadow: '0 2px 8px rgba(196,136,90,0.15)' }} />
        <div style={{ marginTop: 16, padding: '14px 16px', background: 'var(--copper-pale)', borderRadius: 12, border: '1px solid rgba(196,136,90,0.3)', display: 'flex', gap: 10, alignItems: 'flex-start' }}>
          <span style={{ fontSize: 18, flexShrink: 0 }}>💡</span>
          <p style={{ color: 'var(--brown)', fontSize: 13, margin: 0, lineHeight: 1.5 }}>
            {dados.status === 'iniciando' ? 'Ainda vai começar? Selecione hoje. Você poderá ajustar depois.' : 'Insira a data da sua primeira dose para calcular as próximas aplicações.'}
          </p>
        </div>
      </div>
      <OBFooter onPress={next} disabled={!dados.dataInicio} />
    </Wrap>
  );

  /* ── Step 7: Sexo ── */
  if (step === 7) return (
    <Wrap>
      <OBHeader title="Qual é o seu sexo biológico?" subtitle="Ajuda a personalizar metas e informações de saúde" />
      <div style={{ flex: 1, padding: '20px 24px', display: 'flex', flexDirection: 'column', gap: 12, overflowY: 'auto' }}>
        {[{ id: 'feminino', label: 'Feminino', iconName: 'female' }, { id: 'masculino', label: 'Masculino', iconName: 'male' }, { id: 'outro', label: 'Prefiro não informar', iconName: 'hand-heart' }].map(s => (
          <OptionRow key={s.id} selected={dados.sexo === s.id} onClick={() => set('sexo', s.id)} iconName={s.iconName} label={s.label} />
        ))}
      </div>
      <OBFooter onPress={next} disabled={!dados.sexo} />
    </Wrap>
  );

  /* ── Step 8: Peso início ── */
  if (step === 8) return (
    <Wrap>
      <OBHeader title="Qual era seu peso no início do tratamento?" subtitle="Vamos calcular quanto você já perdeu" />
      <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <NumberStepper value={dados.pesoInicio} onChange={v => set('pesoInicio', v)} min={40} max={300} step={0.5} unit="kg" />
      </div>
      <OBFooter onPress={next} />
    </Wrap>
  );

  /* ── Step 9: Peso atual ── */
  if (step === 9) return (
    <Wrap>
      <OBHeader title="Qual é o seu peso atual?" subtitle="Você pode atualizar sempre na aba Peso" />
      <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <NumberStepper value={dados.pesoAtual} onChange={v => set('pesoAtual', Math.min(v, dados.pesoInicio))} min={40} max={dados.pesoInicio} step={0.5} unit="kg" />
      </div>
      <OBFooter onPress={next} />
    </Wrap>
  );

  /* ── Step 10: Meta de peso ── */
  if (step === 10) return (
    <Wrap>
      <OBHeader title="Qual é a sua meta de peso?" subtitle="Seu objetivo personaliza suas projeções" />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 20 }}>
        <NumberStepper value={dados.meta} onChange={v => set('meta', Math.min(v, Math.max(40, dados.pesoAtual - 0.5)))} min={40} max={Math.max(41, dados.pesoAtual - 0.5)} step={0.5} unit="kg" />
        {dados.pesoAtual > dados.meta && (
          <div style={{ background: 'var(--copper-pale)', borderRadius: 14, padding: '12px 32px', textAlign: 'center', border: '1px solid rgba(196,136,90,0.3)' }}>
            <div style={{ color: 'var(--copper)', fontWeight: 800, fontSize: 24 }}>−{(dados.pesoAtual - dados.meta).toFixed(1)} kg</div>
            <div style={{ color: 'var(--brown-light)', fontSize: 12, marginTop: 2 }}>meta de perda de peso</div>
          </div>
        )}
      </div>
      <OBFooter onPress={next} />
    </Wrap>
  );

  /* ── Step 11: Objetivos ── */
  if (step === 11) return (
    <Wrap>
      <OBHeader title="Quais são seus objetivos?" subtitle="Selecione todos que se aplicam a você" />
      <div style={{ flex: 1, padding: '16px 24px', display: 'flex', flexDirection: 'column', gap: 10, overflowY: 'auto' }}>
        {objetivos.map(o => {
          const sel = dados.objetivos.includes(o.id);
          return (
            <button key={o.id} onClick={() => toggleObj(o.id)} style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '14px 16px', borderRadius: 14, border: `2px solid ${sel ? 'var(--copper)' : 'rgba(45,31,20,0.1)'}`, background: sel ? 'rgba(196,136,90,0.08)' : 'white', cursor: 'pointer', textAlign: 'left', transition: 'all .15s', width: '100%', boxShadow: sel ? '0 2px 10px rgba(196,136,90,0.18)' : '0 1px 3px rgba(45,31,20,0.04)' }}>
              <div style={{ width: 40, height: 40, borderRadius: 11, background: sel ? 'rgba(196,136,90,0.15)' : '#F5F0EC', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, transition: 'background .15s' }}>
                <Icon name={o.iconName} size={20} color={sel ? 'var(--copper)' : '#9A8070'} strokeWidth={1.8} />
              </div>
              <span style={{ flex: 1, fontWeight: 600, color: 'var(--brown)', fontSize: 15 }}>{o.label}</span>
              <CheckSquare on={sel} />
            </button>
          );
        })}
      </div>
      <OBFooter onPress={next} disabled={dados.objetivos.length === 0} label="Ver meu plano →" />
    </Wrap>
  );

  /* ── Step 12: Plano Personalizado ── */
  if (step === 12) {
    const perda = Math.max(0, dados.pesoAtual - dados.meta).toFixed(1);
    const medLabel = medicamentos.find(m => m.id === dados.medicamento)?.label || dados.medicamento;
    return (
      <Wrap>
        <div style={{ flex: 1, overflowY: 'auto' }}>
          {/* Header do plano — usa o dark gradient do app */}
          <div className="header-grad" style={{ padding: '52px 24px 32px', textAlign: 'center' }}>
            <div style={{ width: 76, height: 76, borderRadius: '50%', background: 'rgba(196,136,90,0.2)', border: '3px solid var(--copper)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px', fontSize: 32 }}>🎯</div>
            <h2 style={{ fontSize: 24, fontWeight: 800, color: 'var(--cream)', margin: '0 0 8px', letterSpacing: '-0.5px' }}>Seu Plano Personalizado</h2>
            <p style={{ color: 'rgba(245,237,227,0.65)', fontSize: 14, margin: 0 }}>Tudo pronto, {dados.nome || 'você'}! Aqui está seu resumo:</p>
          </div>
          <div style={{ padding: '20px 24px', display: 'flex', flexDirection: 'column', gap: 10, background: 'var(--cream-light)' }}>
            {[
              { label: 'Medicamento', valor: medLabel, icon: '💊' },
              dados.concentracaoAmpola && dados.concentracaoAmpola !== 'nao-sei'
                ? { label: 'Concentração da ampola', valor: dados.concentracaoAmpola, icon: '🧪' }
                : null,
              { label: 'Dose atual', valor: dados.dose, icon: '📏' },
              { label: 'Peso no início', valor: `${dados.pesoInicio} kg`, icon: '⚖️' },
              { label: 'Peso atual', valor: `${dados.pesoAtual} kg`, icon: '📍' },
              { label: 'Meta de peso', valor: `${dados.meta} kg`, icon: '🎯' },
              { label: 'Perda esperada', valor: `−${perda} kg`, icon: '📉' },
            ].filter(Boolean).map(item => (
              <div key={item.label} style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '13px 16px', background: 'white', borderRadius: 12, border: '1px solid rgba(196,136,90,0.12)', boxShadow: '0 1px 4px rgba(45,31,20,0.05)' }}>
                <span style={{ fontSize: 20, flexShrink: 0 }}>{item.icon}</span>
                <span style={{ flex: 1, color: 'var(--brown-light)', fontSize: 14, opacity: 0.75 }}>{item.label}</span>
                <span style={{ color: 'var(--brown)', fontWeight: 700, fontSize: 15 }}>{item.valor}</span>
              </div>
            ))}
          </div>
        </div>
        <div style={{ padding: '16px 24px 40px', background: 'var(--cream-light)', borderTop: '1px solid rgba(196,136,90,0.18)', flexShrink: 0 }}>
          <button className="btn-primary" onClick={salvar}>Começar minha jornada 🌿</button>
        </div>
      </Wrap>
    );
  }

  return null;
}

/* ─── NAVEGAÇÃO ──────────────────────────────────────────── */
const TABS = [
  { id: 'home',       label: 'Home',      icon: 'home' },
  { id: 'planejador', label: 'Picadinha', icon: 'syringe' },
  { id: 'diario',     label: 'Diário',    icon: 'book-open' },
  { id: 'peso',       label: 'Peso',      icon: 'scale' },
  { id: 'rê',         label: 'Rê',        icon: 'message-circle' },
];

/* ─── APP ROOT ───────────────────────────────────────────── */
function App() {
  const [tab, setTab] = useState('home');
  const [perfil, setPerfil] = useState(() => {
    try {
      const saved = localStorage.getItem('renove_perfil');
      return saved ? JSON.parse(saved) : null;
    } catch { return null; }
  });

  // Disparar notificação do navegador ao abrir o app no dia da aplicação
  useEffect(() => {
    if (!perfil || !('Notification' in window) || Notification.permission !== 'granted') return;
    const cfg = (() => { try { return JSON.parse(localStorage.getItem('renove_notif') || '{}'); } catch { return {}; } })();
    if (cfg.aplicacao === false) return;

    const dataInicioDate = perfil.dataInicio ? new Date(perfil.dataInicio + 'T00:00:00') : null;
    if (!dataInicioDate) return;
    const hoje = new Date(); hoje.setHours(0,0,0,0);
    const diasJornada = Math.max(0, Math.floor((hoje - dataInicioDate) / (1000*60*60*24)));
    const semanaAtual = Math.floor(diasJornada / 7);
    const proximaApl = new Date(dataInicioDate);
    proximaApl.setDate(proximaApl.getDate() + (semanaAtual + 1) * 7);
    const diasRestantes = Math.max(0, Math.ceil((proximaApl - hoje) / (1000*60*60*24)));

    if (diasRestantes === 0) {
      const hoje2 = new Date().toISOString().split('T')[0];
      const ultimaNotif = localStorage.getItem('renove_ultima_notif');
      if (ultimaNotif !== hoje2) {
        new Notification('Renove GLP-1 💉', {
          body: `Hoje é dia da sua aplicação de ${perfil.dose || '5mg'}! Não esqueça 🌿`,
        });
        localStorage.setItem('renove_ultima_notif', hoje2);
      }
    }
  }, [perfil]);

  // Primeiro acesso → mostrar onboarding
  if (!perfil) {
    return <OnboardingScreen onComplete={p => setPerfil(p)} />;
  }

  const screens = {
    home: <HomeScreen setTab={setTab} perfil={perfil} />,
    planejador: <PlanejadorScreen perfil={perfil} />,
    diario: <DiarioScreen />,
    peso: <PesoScreen perfil={perfil} />,
    rê: <ReScreen perfil={perfil} />,
    calculadora: <CalculadoraScreen />,
    notificacoes: <NotificacoesScreen perfil={perfil} />,
    perfil: <PerfilScreen perfil={perfil} setPerfil={setPerfil} setTab={setTab} />,
  };

  return (
    <>
      {/* Tela atual */}
      <div style={{ position: 'absolute', inset: 0, bottom: (tab === 'rê' || tab === 'perfil') ? 0 : 72 }}>
        {(tab === 'rê' || tab === 'perfil') ? screens[tab] : (
          <div className="screen">
            {screens[tab] || screens['home']}
          </div>
        )}
      </div>

      {/* Botão flutuante da Rê */}
      {tab !== 'rê' && tab !== 'perfil' && (
        <button
          onClick={() => setTab('rê')}
          className="re-fab"
          aria-label="Falar com a Rê"
        >
          <div className="re-fab-inner">
            <svg width="26" height="26" viewBox="0 0 40 40" fill="none">
              <circle cx="20" cy="20" r="20" fill="none"/>
              {/* Folha estilizada */}
              <path d="M20 8 C14 8 10 13 10 19 C10 25 14 30 20 32 C26 30 30 25 30 19 C30 13 26 8 20 8Z" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.5)" strokeWidth="1.2"/>
              <path d="M20 10 Q24 15 23 22 Q22 28 20 31" stroke="rgba(255,255,255,0.7)" strokeWidth="1.2" fill="none" strokeLinecap="round"/>
              <path d="M20 14 Q17 17 16 21" stroke="rgba(255,255,255,0.5)" strokeWidth="1" fill="none" strokeLinecap="round"/>
              <path d="M20 14 Q23 17 24 21" stroke="rgba(255,255,255,0.5)" strokeWidth="1" fill="none" strokeLinecap="round"/>
            </svg>
            <span className="re-fab-label">Rê</span>
          </div>
          <span className="re-fab-ping" />
        </button>
      )}

      {/* Bottom Nav */}
      {tab !== 'perfil' && (
        <div className="bottom-nav">
          {TABS.map(t => {
            const active = tab === t.id;
            return (
              <button key={t.id} className={`nav-btn${active ? ' active' : ''}`} onClick={() => setTab(t.id)}>
                <div className="nav-icon-pill">
                  <Icon name={t.icon} size={22}
                    color={active ? 'var(--copper)' : 'rgba(245,237,227,0.35)'}
                    strokeWidth={active ? 2.5 : 1.8} />
                </div>
                <span className="label">{t.label}</span>
              </button>
            );
          })}
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
