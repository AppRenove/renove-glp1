/* ─── SVG CHART ──────────────────────────────────────────── */
function WeightChart({ dados, meta }) {
  const W = 340, H = 160, PAD = { top: 20, right: 20, bottom: 30, left: 40 };
  const chartW = W - PAD.left - PAD.right;
  const chartH = H - PAD.top - PAD.bottom;
  const minP = Math.min(...dados.map(d => d.peso)) - 1;
  const maxP = Math.max(...dados.map(d => d.peso)) + 1;
  const scaleX = i => PAD.left + (i / (dados.length - 1)) * chartW;
  const scaleY = v => PAD.top + (1 - (v - minP) / (maxP - minP)) * chartH;
  const pts = dados.map((d, i) => `${scaleX(i)},${scaleY(d.peso)}`).join(' ');
  const area = `M ${scaleX(0)},${scaleY(dados[0].peso)} ` +
    dados.slice(1).map((d, i) => `L ${scaleX(i+1)},${scaleY(d.peso)}`).join(' ') +
    ` L ${scaleX(dados.length-1)},${PAD.top + chartH} L ${PAD.left},${PAD.top + chartH} Z`;

  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ overflow: 'visible' }}>
      <defs>
        <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#C4885A" stopOpacity="0.25" />
          <stop offset="100%" stopColor="#C4885A" stopOpacity="0.02" />
        </linearGradient>
      </defs>
      {/* Grid lines */}
      {[0,0.25,0.5,0.75,1].map(t => (
        <line key={t} x1={PAD.left} y1={PAD.top + t * chartH} x2={W - PAD.right} y2={PAD.top + t * chartH}
          stroke="#E8E0D8" strokeWidth="1" />
      ))}
      {/* Area */}
      <path d={area} fill="url(#chartGrad)" />
      {/* Line */}
      <polyline points={pts} fill="none" stroke="#C4885A" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
      {/* Dots */}
      {dados.map((d, i) => (
        <circle key={i} cx={scaleX(i)} cy={scaleY(d.peso)} r={i === dados.length - 1 ? 5 : 3}
          fill={i === dados.length - 1 ? '#C4885A' : 'white'} stroke="#C4885A" strokeWidth="2" />
      ))}
      {/* Labels X — mostrar só início, meio e fim */}
      {[0, Math.floor(dados.length/2), dados.length-1].map(i => (
        <text key={i} x={scaleX(i)} y={H - 4} textAnchor="middle" fontSize="9" fill="#9A8070">{dados[i].data}</text>
      ))}
      {/* Labels Y */}
      {[minP+1, (minP+maxP)/2, maxP-1].map((v, i) => (
        <text key={i} x={PAD.left - 6} y={scaleY(v) + 4} textAnchor="end" fontSize="9" fill="#9A8070">{Math.round(v)}</text>
      ))}
    </svg>
  );
}

/* ─── TELA: HOME ─────────────────────────────────────────── */

  const meta       = parseFloat(perfil?.meta)       || 85;
  const perdido    = Math.max(0, pesoInicio - pesoAtual).toFixed(1);
  const progresso  = Math.min(100, Math.max(0, ((pesoInicio - pesoAtual) / (pesoInicio - meta)) * 100)).toFixed(0);

  // Saudação por horário
  const hora = new Date().getHours();
  const saudacao = hora < 12 ? 'Bom dia' : hora < 18 ? 'Boa tarde' : 'Boa noite';

  // Calcular dias de jornada
  const dataInicioDate = perfil?.dataInicio ? new Date(perfil.dataInicio + 'T00:00:00') : new Date('2025-02-01');
  const hoje = new Date();
  hoje.setHours(0, 0, 0, 0);
  const diasJornada = Math.max(0, Math.floor((hoje - dataInicioDate) / (1000 * 60 * 60 * 24)));

  const semanaAtual = Math.floor(diasJornada / 7);
  const proximaApl = new Date(dataInicioDate);
  proximaApl.setDate(proximaApl.getDate() + (semanaAtual + 1) * 7);
  const diasRestantes = Math.max(0, Math.ceil((proximaApl - hoje) / (1000 * 60 * 60 * 24)));
  const diasSemanaPT = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
  const proxDia = diasSemanaPT[proximaApl.getDay()];
  const proxDataStr = `${proximaApl.getDate().toString().padStart(2,'0')}/${(proximaApl.getMonth()+1).toString().padStart(2,'0')}`;

  return (

            <button onClick={() => setTab('notificacoes')} style={{ width: 40, height: 40, borderRadius: '50%', background: 'rgba(196,136,90,0.15)', border: '1.5px solid rgba(196,136,90,0.35)', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
              <Icon name="bell" size={19} color="rgba(245,237,227,0.8)" strokeWidth={1.8} />
            </button>
            <div style={{ width: 44, height: 44, borderRadius: '50%', background: 'rgba(196,136,90,0.25)', border: '2px solid var(--copper)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Icon name="user" size={22} color="var(--copper)" strokeWidth={1.8} />
            </div>
          </div>
        </div>

        {/* Stats rápidas */}
        <div className="flex gap-3">
          {[
            { label: 'Dias de jornada', valor: diasJornada, icon: 'calendar' },
            { label: 'Kg perdidos', valor: `${perdido}kg`, icon: 'trending-down' },
            { label: 'Dose atual', valor: perfil?.dose || '5mg', icon: 'zap' },
          ].map(s => (
            <div key={s.label} style={{ flex: 1, background: 'rgba(255,255,255,0.07)', borderRadius: 12, padding: '10px 8px', textAlign: 'center', border: '1px solid rgba(196,136,90,0.15)' }}>
              <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 4 }}>
                <Icon name={s.icon} size={16} color="var(--copper-light)" strokeWidth={2} />
              </div>
              <div style={{ color: 'var(--cream)', fontWeight: 700, fontSize: 15 }}>{s.valor}</div>
              <div style={{ color: 'rgba(245,237,227,0.5)', fontSize: 10, lineHeight: 1.2 }}>{s.label}</div>

          ))}
        </div>
      </div>

      <div className="px-4 py-4 flex flex-col gap-4">
        {/* Banner de alerta de aplicação */}
        {diasRestantes === 0 && (
          <div onClick={() => setTab('planejador')} style={{ background: 'linear-gradient(135deg, var(--copper) 0%, var(--copper-light) 100%)', borderRadius: 14, padding: '14px 16px', display: 'flex', gap: 12, alignItems: 'center', cursor: 'pointer', boxShadow: '0 4px 16px rgba(196,136,90,0.4)' }}>

/* ─── TELA: DIÁRIO ───────────────────────────────────────── */
function DiarioScreen() {
  const hoje = new Date();
  const dataISO = hoje.toISOString().split('T')[0];
  const mesesPT = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const dataStr = `${hoje.getDate()} de ${mesesPT[hoje.getMonth()]}`;

  // Carrega todas as entradas do localStorage
  const [entradas, setEntradas] = useState(() => {
    try { return JSON.parse(localStorage.getItem('renove_diario') || '{}'); } catch { return {}; }
  });

  const entradaHoje = entradas[dataISO] || null;

  const [sintomas, setSintomas] = useState(entradaHoje?.sintomas || {
    nausea: 0, vomito: 0, constipacao: 0, dor: 0, tontura: 0, local: 0,
  });
  const [hydra, setHydra] = useState(entradaHoje?.hydra || 1.5);
  const [saved, setSaved] = useState(!!entradaHoje);

  // Calcula sequência real de dias consecutivos
  const calcStreak = (entradasObj) => {
    let streak = 0;
    const d = new Date();
    for (let i = 0; i < 365; i++) {
      const iso = d.toISOString().split('T')[0];
      if (!entradasObj[iso]) break;
      streak++;
      d.setDate(d.getDate() - 1);
    }
    return streak;
  };

  const salvar = () => {
    const novas = { ...entradas, [dataISO]: { sintomas, hydra, salvoEm: new Date().toISOString() } };
    setEntradas(novas);
    localStorage.setItem('renove_diario', JSON.stringify(novas));
    setSaved(true);
  };

  const streak = calcStreak(saved ? { ...entradas, [dataISO]: true } : entradas);

  const niveis = ['Nenhum', 'Leve', 'Moderado', 'Intenso'];
  const listaSintomas = [
    { key: 'nausea', label: 'Náusea', emoji: '🤢' },
    { key: 'vomito', label: 'Vômito', emoji: '🤮' },
    { key: 'constipacao', label: 'Constipação', emoji: '😣' },
    { key: 'dor', label: 'Dor abdominal', emoji: '😖' },
    { key: 'tontura', label: 'Tontura', emoji: '😵' },
    { key: 'local', label: 'Reação no local', emoji: '💢' },
  ];

  const maxSintoma = Math.max(...Object.values(sintomas));
  const semaforo = maxSintoma <= 1 ? 'verde' : maxSintoma === 2 ? 'amarelo' : 'vermelho';
  const msgSemaforo = {
    verde: { cor: 'var(--green)', bg: '#E8F8EE', txt: 'Tudo certo! Continue hidratando bem e priorizando proteína 💚', emoji: '🟢' },
    amarelo: { cor: 'var(--yellow)', bg: '#FFF8E0', txt: 'Cuide-se! Coma devagar, em pequenas porções, e descanse quando precisar 💛', emoji: '🟡' },
    vermelho: { cor: 'var(--red)', bg: '#FDECEA', txt: 'Sintomas intensos — considere falar com seu médico ❤️', emoji: '🔴' },
  };
  const s = msgSemaforo[semaforo];

  // Entradas recentes para o mini histórico
  const entradasRecentes = Object.entries(entradas)
    .sort((a, b) => b[0] > a[0] ? 1 : -1)
    .slice(0, 5);

  return (
    <div className="screen">
      <div className="header-grad px-5 pt-12 pb-6">
        <div className="flex items-center justify-between">
          <div>
            <h2 style={{ color: 'var(--cream)', fontSize: 22, fontWeight: 700, margin: 0, marginBottom: 4 }}>Diário de Sintomas 📔</h2>
            <p style={{ color: 'rgba(245,237,227,0.6)', fontSize: 13, margin: 0 }}>Hoje, {dataStr}</p>
          </div>
          {streak > 0 && (
            <div style={{ textAlign: 'center', background: 'rgba(255,255,255,0.1)', borderRadius: 12, padding: '8px 14px' }}>
              <div style={{ fontSize: 20 }}>🔥</div>
              <div style={{ color: 'var(--copper-light)', fontWeight: 800, fontSize: 16, lineHeight: 1 }}>{streak}</div>
              <div style={{ color: 'rgba(245,237,227,0.6)', fontSize: 10 }}>dias</div>
            </div>
          )}
        </div>
      </div>

      <div className="px-4 py-4 flex flex-col gap-4">
        {/* Semáforo */}
        <div style={{ background: s.bg, borderRadius: 14, padding: '14px 16px', border: `1.5px solid ${s.cor}30` }}>
          <div className="flex items-center gap-3">
            <span style={{ fontSize: 28 }}>{s.emoji}</span>
            <div>
              <div style={{ fontWeight: 700, color: s.cor, fontSize: 14 }}>Status de hoje</div>
              <div style={{ fontSize: 13, color: s.cor, opacity: 0.85 }}>{s.txt}</div>
            </div>
          </div>
        </div>

        {/* Sintomas */}
        <div className="card">
          <div style={{ fontWeight: 700, color: 'var(--brown)', fontSize: 15, marginBottom: 14 }}>Como você está?</div>
          <div className="flex flex-col gap-4">
            {listaSintomas.map(({ key, label, emoji }) => (
              <div key={key}>
                <div className="flex items-center gap-2 mb-2">
                  <span style={{ fontSize: 18 }}>{emoji}</span>
                  <span style={{ fontSize: 14, fontWeight: 600, color: 'var(--brown)' }}>{label}</span>
                </div>
                <div style={{ display: 'flex', gap: 6 }}>
                  {niveis.map((n, i) => (
                    <button key={n} onClick={() => setSintomas(prev => ({ ...prev, [key]: i }))}
                      style={{
                        flex: 1, padding: '8px 2px', borderRadius: 8, fontSize: 11, fontWeight: 600, cursor: 'pointer', border: 'none',
                        background: sintomas[key] === i
                          ? (i === 0 ? '#E8F8EE' : i === 1 ? '#FFF8E0' : i === 2 ? '#FFF0D0' : '#FDECEA')
                          : '#F5F0EC',
                        color: sintomas[key] === i
                          ? (i === 0 ? 'var(--green)' : i === 1 ? 'var(--yellow)' : i === 2 ? '#C47A00' : 'var(--red)')
                          : '#9A8070',
                        outline: sintomas[key] === i ? '2px solid currentColor' : 'none',
                        outlineOffset: '-2px',
                      }}>{n}</button>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Hidratação */}
        <div className="card">
          <div style={{ fontWeight: 700, color: 'var(--brown)', fontSize: 15, marginBottom: 10 }}>💧 Hidratação hoje</div>
          <div className="flex items-center gap-4">
            <button onClick={() => setHydra(h => Math.max(0, +(h - 0.25).toFixed(2)))}
              style={{ width: 40, height: 40, borderRadius: '50%', background: '#F5F0EC', border: 'none', fontSize: 20, cursor: 'pointer', fontWeight: 700, color: 'var(--brown-light)' }}>−</button>
            <div style={{ flex: 1, textAlign: 'center' }}>
              <div style={{ fontSize: 32, fontWeight: 800, color: hydra >= 2 ? 'var(--green)' : 'var(--copper)' }}>{hydra.toFixed(1)}L</div>
              <div style={{ fontSize: 12, color: '#9A8070' }}>Meta: 2,5L</div>
              <div style={{ height: 6, background: '#EEE8E0', borderRadius: 3, marginTop: 8 }}>
                <div style={{ height: '100%', background: hydra >= 2 ? 'var(--green)' : 'var(--copper)', borderRadius: 3, width: `${Math.min(100, (hydra/2.5)*100)}%`, transition: 'width .3s' }} />
              </div>
            </div>
            <button onClick={() => setHydra(h => +(h + 0.25).toFixed(2))}
              style={{ width: 40, height: 40, borderRadius: '50%', background: 'var(--copper)', border: 'none', fontSize: 20, cursor: 'pointer', fontWeight: 700, color: 'white' }}>+</button>
          </div>
        </div>

        {!saved ? (
          <button className="btn-primary" onClick={salvar} style={{ fontSize: 16, padding: 16 }}>
            💾 Salvar registro de hoje
          </button>
        ) : (
          <div style={{ background: '#E8F8EE', border: '1.5px solid var(--green)', borderRadius: 14, padding: 16, textAlign: 'center' }}>
            <div style={{ fontSize: 28, marginBottom: 4 }}>✅</div>
            <div style={{ fontWeight: 700, color: '#2E7D52', fontSize: 15 }}>
              Registro salvo!{streak > 1 ? ` Sequência: 🔥 ${streak} dias` : ' Primeiro dia registrado 🌱'}
            </div>
            <button onClick={() => setSaved(false)} style={{ background: 'none', border: 'none', color: '#4CAF7A', fontSize: 12, cursor: 'pointer', marginTop: 6, fontWeight: 600 }}>
              Editar registro →
            </button>
          </div>
        )}

        {/* Mini histórico */}
        {entradasRecentes.length > 1 && (
          <div>
            <div style={{ fontWeight: 700, color: 'var(--brown)', fontSize: 15, marginBottom: 10 }}>Registros anteriores</div>
            {entradasRecentes.map(([iso, entrada]) => {
              if (iso === dataISO) return null;
              const d = new Date(iso + 'T00:00:00');
              const dataFormatada = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
              const max = Math.max(...Object.values(entrada.sintomas || {}));
              const cor = max <= 1 ? 'var(--green)' : max === 2 ? 'var(--yellow)' : 'var(--red)';
              const emoji = max <= 1 ? '🟢' : max === 2 ? '🟡' : '🔴';
              return (
                <div key={iso} style={{ background: 'white', borderRadius: 12, padding: '12px 14px', marginBottom: 6, display: 'flex', justifyContent: 'space-between', alignItems: 'center', boxShadow: '0 1px 6px rgba(45,31,20,0.05)' }}>
                  <div style={{ fontWeight: 600, color: 'var(--brown)', fontSize: 14 }}>{dataFormatada}</div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <span style={{ fontSize: 16 }}>{emoji}</span>
                    <span style={{ fontSize: 12, color: '#9A8070' }}>💧 {(entrada.hydra || 0).toFixed(1)}L</span>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── TELA: PESO ─────────────────────────────────────────── */
function PesoScreen({ perfil }) {
  const meta = parseFloat(perfil?.meta) || 85;
  const pesoInicialPerfil = parseFloat(perfil?.pesoInicio) || 112.4;
  const dataInicioPerfil = perfil?.dataInicio || '2025-02-01';

  const fmtData = (isoStr) => {
    const d = new Date(isoStr + 'T00:00:00');
    return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
  };

  // Carrega do localStorage, semeando com dados do perfil se vazio
  const [pesos, setPesos] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('renove_pesos') || 'null');
      if (saved && saved.length > 0) return saved;
    } catch {}
    const entries = [{ data: fmtData(dataInicioPerfil), peso: pesoInicialPerfil, dataISO: dataInicioPerfil }];
    const pesoAtualPerfil = parseFloat(perfil?.pesoAtual);
    if (pesoAtualPerfil && pesoAtualPerfil !== pesoInicialPerfil) {
      const hoje = new Date().toISOString().split('T')[0];
      if (hoje !== dataInicioPerfil) entries.push({ data: fmtData(hoje), peso: pesoAtualPerfil, dataISO: hoje });
    }
    return entries;
  });

  const [novoPeso, setNovoPeso] = useState('');
  const [periodo, setPeriodo] = useState('all');
  const [adicionado, setAdicionado] = useState(false);

  const salvarPesos = (arr) => {
    setPesos(arr);
    localStorage.setItem('renove_pesos', JSON.stringify(arr));
  };

  const nPts = { '14': 3, '30': 6, 'all': pesos.length };
  const dadosFiltrados = pesos.slice(-nPts[periodo]);
  const pesoAtual = pesos[pesos.length - 1].peso;
  const pesoInicio = pesos[0].peso;
  const perdido = Math.max(0, pesoInicio - pesoAtual).toFixed(1);
  const progresso = Math.max(0, Math.min(100, ((pesoInicio - pesoAtual) / (pesoInicio - meta) * 100))).toFixed(0);
  const faltaMeta = Math.max(0, pesoAtual - meta).toFixed(1);

  const adicionar = () => {
    const p = parseFloat(novoPeso.replace(',', '.'));
    if (!p || p < 30 || p > 300) return;
    const hoje = new Date();
    const dataISO = hoje.toISOString().split('T')[0];
    const data = fmtData(dataISO);
    // Substitui se já existe entrada de hoje
    const filtrado = pesos.filter(x => x.dataISO !== dataISO);
    salvarPesos([...filtrado, { data, peso: p, dataISO }].sort((a, b) => a.dataISO > b.dataISO ? 1 : -1));
    setNovoPeso('');
    setAdicionado(true);
    setTimeout(() => setAdicionado(false), 2500);
  };

  return (
    <div className="screen">
      <div className="header-grad px-5 pt-12 pb-6">
        <h2 style={{ color: 'var(--cream)', fontSize: 22, fontWeight: 700, margin: 0, marginBottom: 4 }}>Evolução de Peso ⚖️</h2>
        <p style={{ color: 'rgba(245,237,227,0.6)', fontSize: 13, margin: 0 }}>Desde o início do tratamento</p>
      </div>

      <div className="px-4 py-4 flex flex-col gap-4">
        {/* Cards de stats */}
        <div className="flex gap-3">
          {[
            { label: 'Peso atual', valor: `${pesoAtual}kg`, cor: 'var(--brown)' },
            { label: 'Perdidos', valor: perdido > 0 ? `↓ ${perdido}kg` : '—', cor: 'var(--green)' },
            { label: 'Falta p/ meta', valor: `${faltaMeta}kg`, cor: 'var(--copper)' },
          ].map(s => (
            <div key={s.label} className="card" style={{ flex: 1, textAlign: 'center', padding: '12px 8px' }}>
              <div style={{ fontWeight: 800, fontSize: 17, color: s.cor }}>{s.valor}</div>
              <div style={{ fontSize: 11, color: '#9A8070', marginTop: 2 }}>{s.label}</div>
            </div>
          ))}
        </div>

        {/* Progresso meta */}
        <div className="card">
          <div className="flex justify-between items-center mb-2">
            <span style={{ fontWeight: 600, fontSize: 14, color: 'var(--brown)' }}>Progresso até {meta}kg</span>
            <span style={{ fontWeight: 700, fontSize: 16, color: 'var(--copper)' }}>{progresso}%</span>
          </div>
          <div style={{ height: 10, background: '#EEE8E0', borderRadius: 5 }}>
            <div style={{ height: '100%', background: 'linear-gradient(90deg, var(--copper), var(--copper-light))', borderRadius: 5, width: `${progresso}%`, transition: 'width .5s' }} />
          </div>
          <div className="flex justify-between mt-2" style={{ fontSize: 11, color: '#9A8070' }}>
            <span>Início: {pesoInicio}kg</span>
            <span>Meta: {meta}kg</span>
          </div>
        </div>

        {/* Registrar novo peso */}
        <div className="card">
          <div style={{ fontWeight: 700, color: 'var(--brown)', fontSize: 15, marginBottom: 12 }}>Registrar novo peso</div>
          {adicionado ? (
            <div style={{ background: '#E8F8EE', border: '1.5px solid var(--green)', borderRadius: 10, padding: '12px 16px', textAlign: 'center', color: '#2E7D52', fontWeight: 700, fontSize: 15 }}>
              ✅ Peso registrado!
            </div>
          ) : (
            <div className="flex gap-2">
              <input
                type="number" inputMode="decimal" placeholder="Ex: 97,5" value={novoPeso}
                onChange={e => setNovoPeso(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && adicionar()}
                style={{ flex: 1, padding: '12px 14px', borderRadius: 10, border: '1.5px solid #E0D8D0', fontSize: 15, color: 'var(--brown)' }}
              />
              <button onClick={adicionar} className="btn-primary" style={{ width: 'auto', padding: '12px 20px', fontSize: 15 }}>
                + Salvar
              </button>
            </div>
          )}
        </div>

        {/* Gráfico */}
        {pesos.length >= 2 && (
          <div className="card">
            <div className="flex justify-between items-center mb-3">
              <span style={{ fontWeight: 700, color: 'var(--brown)', fontSize: 15 }}>Gráfico</span>
              <div className="flex gap-1">
                {[['14','14d'],['30','30d'],['all','Tudo']].map(([v,l]) => (
                  <button key={v} onClick={() => setPeriodo(v)}
                    style={{ padding: '4px 10px', borderRadius: 8, fontSize: 11, fontWeight: 600, border: 'none', cursor: 'pointer',
                      background: periodo === v ? 'var(--copper)' : '#F5F0EC',
                      color: periodo === v ? 'white' : '#8A7060' }}>{l}</button>
                ))}
              </div>
            </div>
            <WeightChart dados={dadosFiltrados.length >= 2 ? dadosFiltrados : pesos} meta={meta} />
          </div>
        )}

        {/* Histórico */}
        <div>
          <div style={{ fontWeight: 700, color: 'var(--brown)', fontSize: 15, marginBottom: 10 }}>Histórico</div>
          {[...pesos].reverse().map((p, i, arr) => {
            const anterior = arr[i + 1];
            const diff = anterior ? (p.peso - anterior.peso) : null;
            return (
              <div key={p.dataISO || i} style={{ background: 'white', borderRadius: 12, padding: '12px 14px', marginBottom: 6, display: 'flex', justifyContent: 'space-between', alignItems: 'center', boxShadow: '0 1px 6px rgba(45,31,20,0.05)' }}>
                <div>
                  <div style={{ fontWeight: 600, color: 'var(--brown)', fontSize: 14 }}>{p.data}</div>
                  {i === 0 && <div style={{ fontSize: 11, color: 'var(--copper)', fontWeight: 600, marginTop: 1 }}>Mais recente</div>}
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  {diff !== null && (
                    <span style={{ fontSize: 12, fontWeight: 600, color: diff < 0 ? 'var(--green)' : diff > 0 ? 'var(--red)' : '#9A8070' }}>
                      {diff < 0 ? `↓ ${Math.abs(diff).toFixed(1)}kg` : diff > 0 ? `↑ ${diff.toFixed(1)}kg` : '—'}
                    </span>
                  )}
                  <span style={{ fontWeight: 700, fontSize: 16, color: 'var(--brown)' }}>{p.peso}kg</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ─── TELA: CALCULADORA ──────────────────────────────────── */
function CalculadoraScreen() {
  const [form, setForm] = useState({ sexo: 'F', idade: 34, altura: 165, peso: 98.9, cintura: 96, quadril: 112, pescoco: 36 });
  const [result, setResult] = useState(null);

  const calcular = () => {
    const { sexo, altura, cintura, quadril, pescoco, peso, idade } = form;
    let gordura;
    if (sexo === 'F') {
      gordura = 495 / (1.29579 - 0.35004 * Math.log10(cintura + quadril - pescoco) + 0.22100 * Math.log10(altura)) - 450;
    } else {
      gordura = 495 / (1.0324 - 0.19077 * Math.log10(cintura - pescoco) + 0.15456 * Math.log10(altura)) - 450;
    }
    gordura = Math.max(5, Math.min(60, gordura));
    const massaGorda = (gordura / 100) * peso;
    const massaMagra = peso - massaGorda;
    const imc = peso / ((altura / 100) ** 2);
    const rcq = cintura / quadril;
    setResult({ gordura: gordura.toFixed(1), massaGorda: massaGorda.toFixed(1), massaMagra: massaMagra.toFixed(1), imc: imc.toFixed(1), rcq: rcq.toFixed(2) });
  };

  const f = (key) => ({ value: form[key], onChange: e => setForm(p => ({ ...p, [key]: parseFloat(e.target.value) || e.target.value }) )});
  const inputStyle = { width: '100%', padding: '11px 14px', borderRadius: 10, border: '1.5px solid #E0D8D0', fontSize: 14, color: 'var(--brown)' };

  const imcLabel = result ? (result.imc < 18.5 ? 'Abaixo do peso' : result.imc < 25 ? 'Normal' : result.imc < 30 ? 'Sobrepeso' : 'Obesidade') : '';
  const imcCor = result ? (result.imc < 25 ? 'var(--green)' : result.imc < 30 ? 'var(--yellow)' : 'var(--red)') : '';

  return (
    <div className="screen">
      <div className="header-grad px-5 pt-12 pb-6">
        <h2 style={{ color: 'var(--cream)', fontSize: 22, fontWeight: 700, margin: 0, marginBottom: 4 }}>Calculadora Corporal 🧮</h2>
        <p style={{ color: 'rgba(245,237,227,0.6)', fontSize: 13, margin: 0 }}>Método da Marinha dos EUA</p>
      </div>

      <div className="px-4 py-4 flex flex-col gap-4">
        <div className="card">
          <div style={{ fontWeight: 700, color: 'var(--brown)', fontSize: 15, marginBottom: 14 }}>Seus dados</div>
          {/* Sexo */}
          <div className="mb-4">
            <label style={{ fontSize: 13, fontWeight: 600, color: '#8A7060', display: 'block', marginBottom: 6 }}>Sexo</label>
            <div className="flex gap-2">
              {['F','M'].map(s => (
                <button key={s} onClick={() => setForm(p => ({ ...p, sexo: s }))}
                  style={{ flex: 1, padding: 10, borderRadius: 10, border: 'none', fontSize: 14, fontWeight: 600, cursor: 'pointer',
                    background: form.sexo === s ? 'var(--copper)' : '#F5F0EC',
                    color: form.sexo === s ? 'white' : 'var(--brown-light)' }}>
                  {s === 'F' ? '👩 Feminino' : '👨 Masculino'}
                </button>
              ))}
            </div>
          </div>
          {/* Campos */}
          {[
            { key: 'idade', label: 'Idade (anos)', placeholder: '34' },
            { key: 'altura', label: 'Altura (cm)', placeholder: '165' },
            { key: 'peso', label: 'Peso atual (kg)', placeholder: '98,9' },
            { key: 'cintura', label: 'Cintura (cm) — altura do umbigo', placeholder: '96' },
            { key: 'quadril', label: 'Quadril (cm) — parte mais larga', placeholder: '112' },
            { key: 'pescoco', label: 'Pescoço (cm) — abaixo da laringe', placeholder: '36' },
          ].map(({ key, label, placeholder }) => (
            <div key={key} className="mb-3">
              <label style={{ fontSize: 13, fontWeight: 600, color: '#8A7060', display: 'block', marginBottom: 6 }}>{label}</label>
              <input type="number" placeholder={placeholder} {...f(key)} style={inputStyle} />
            </div>
          ))}
          <button className="btn-primary" onClick={calcular} style={{ fontSize: 15, padding: 14, marginTop: 4 }}>Calcular composição corporal</button>
        </div>

        {result && (
          <div className="card">
            <div style={{ fontWeight: 700, color: 'var(--brown)', fontSize: 15, marginBottom: 14 }}>Resultado da análise</div>
            {[
              { label: '% de gordura corporal', valor: `${result.gordura}%`, sub: `${result.massaGorda}kg de gordura`, cor: parseFloat(result.gordura) > 30 ? 'var(--red)' : 'var(--copper)' },
              { label: '% de massa magra', valor: `${(100-parseFloat(result.gordura)).toFixed(1)}%`, sub: `${result.massaMagra}kg de massa magra`, cor: 'var(--green)' },
              { label: 'IMC', valor: result.imc, sub: imcLabel, cor: imcCor },
              { label: 'Relação cintura/quadril', valor: result.rcq, sub: result.rcq < 0.85 ? 'Dentro do ideal' : 'Atenção ao risco cardiovascular', cor: result.rcq < 0.85 ? 'var(--green)' : 'var(--yellow)' },
            ].map(r => (
              <div key={r.label} style={{ padding: '12px 14px', background: '#FBF7F3', borderRadius: 10, marginBottom: 8 }}>
                <div className="flex justify-between items-start">
                  <div>
                    <div style={{ fontSize: 13, color: '#8A7060', marginBottom: 2 }}>{r.label}</div>
                    <div style={{ fontSize: 12, color: r.cor, fontWeight: 500 }}>{r.sub}</div>
                  </div>
                  <div style={{ fontWeight: 800, fontSize: 22, color: r.cor }}>{r.valor}</div>
                </div>
              </div>
            ))}
            <div style={{ marginTop: 10, padding: '10px 12px', background: '#F5F0EC', borderRadius: 10, fontSize: 12, color: '#8A7060', lineHeight: 1.5 }}>
              ⚠️ Estimativa baseada no Método da Marinha dos EUA. Não substitui avaliação com bioimpedância ou DEXA.
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── TELA: RÊ (chat) ────────────────────────────────────── */
function ReScreen() {
  const [msgs, setMsgs] = useState(MSGS_INICIAIS);
  const [historico, setHistorico] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [msgs]);

  const enviar = async () => {
    const txt = input.trim();
    if (!txt || loading) return;

    const novaMsg = { de: 'user', texto: txt };
    setMsgs(m => [...m, novaMsg]);
    setInput('');
    setLoading(true);

    const novoHistorico = [...historico, { role: 'user', content: txt }];
    setHistorico(novoHistorico);

    try {
      // Se tiver chave local (dev), chama OpenAI direto.
      // Em produção (Vercel), usa o proxy seguro /api/chat.
      const payload = {
        model: 'gpt-4o-mini',
        messages: [
          { role: 'system', content: SISTEMA_RE },
          ...novoHistorico,
        ],
        max_tokens: 400,
        temperature: 0.7,
      };

      const res = OPENAI_KEY
        ? await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${OPENAI_KEY}` },
            body: JSON.stringify(payload),
          })
        : await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });

      const data = await res.json();

      if (!res.ok) {
        // API retornou erro HTTP (401, 429, 500, etc.)
        const erroMsg = data?.error?.message || `Erro ${res.status}`;
        setMsgs(m => [...m, { de: 'rê', texto: `⚠️ Erro da API: ${erroMsg}` }]);
        setHistorico(h => [...h, { role: 'assistant', content: erroMsg }]);
        setLoading(false);
        return;
      }

      const resposta = data.choices?.[0]?.message?.content || 'Desculpe, tive um problema para responder. Tente novamente!';
      setMsgs(m => [...m, { de: 'rê', texto: resposta }]);
      setHistorico(h => [...h, { role: 'assistant', content: resposta }]);
    } catch (e) {
      setMsgs(m => [...m, { de: 'rê', texto: `⚠️ Erro de conexão: ${e.message}` }]);
    }

    setLoading(false);
  };

  const sugestoes = ['Como puxar 2,5mg na seringa?', 'Esqueci de aplicar, e agora?', 'Estou com enjoo', 'Onde posso aplicar?'];

  return (
    <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column' }}>
      {/* Header */}
      <div className="header-grad px-5 pt-12 pb-5" style={{ flexShrink: 0 }}>
        <div className="flex items-center gap-3">
          <div style={{ width: 44, height: 44, borderRadius: '50%', background: 'rgba(196,136,90,0.2)', border: '2px solid var(--copper)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22 }}>🌿</div>
          <div>
            <div style={{ color: 'var(--cream)', fontWeight: 700, fontSize: 17 }}>Rê</div>
            <div style={{ color: 'var(--green)', fontSize: 12, fontWeight: 500 }}>● Online</div>
          </div>
        </div>
      </div>

      {/* Mensagens */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '16px 16px 0', background: 'var(--cream-light)' }}>
        {msgs.map((m, i) => (
          <div key={i} style={{ display: 'flex', justifyContent: m.de === 'user' ? 'flex-end' : 'flex-start', marginBottom: 12 }}>
            {m.de === 'rê' && (
              <div style={{ width: 32, height: 32, borderRadius: '50%', background: 'var(--copper-pale)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16, marginRight: 8, flexShrink: 0, alignSelf: 'flex-end' }}>🌿</div>
            )}
            <div className={m.de === 'user' ? 'chat-bubble-user' : 'chat-bubble-rê'}
              style={{ maxWidth: '78%', padding: '10px 14px', fontSize: 14, lineHeight: 1.5, color: m.de === 'user' ? 'white' : 'var(--brown)', whiteSpace: 'pre-wrap' }}>
              {m.texto}
            </div>
          </div>
        ))}
        {loading && (
          <div style={{ display: 'flex', marginBottom: 12 }}>
            <div style={{ width: 32, height: 32, borderRadius: '50%', background: 'var(--copper-pale)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16, marginRight: 8 }}>🌿</div>
            <div className="chat-bubble-rê" style={{ padding: '14px 18px' }}>
              <div className="flex gap-1">
                {[0,1,2].map(i => <div key={i} className="pulse" style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--copper)', animationDelay: `${i*0.2}s` }} />)}
              </div>
            </div>
          </div>
        )}
        {msgs.length === 1 && (
          <div>
            <div style={{ fontSize: 12, color: '#9A8070', textAlign: 'center', marginBottom: 10 }}>Perguntas frequentes</div>
            <div className="flex flex-col gap-2 mb-4">
              {sugestoes.map(s => (
                <button key={s} onClick={() => { setInput(s); }}
                  style={{ background: 'white', border: '1.5px solid var(--copper-pale)', borderRadius: 20, padding: '10px 16px', fontSize: 13, color: 'var(--brown-light)', cursor: 'pointer', textAlign: 'left', boxShadow: '0 1px 4px rgba(45,31,20,0.06)' }}>
                  💬 {s}
                </button>
              ))}
            </div>
          </div>
        )}
        <div ref={endRef} />
      </div>

      {/* Input */}
      <div style={{ padding: '10px 12px', background: 'white', borderTop: '1px solid #EEE8E0', paddingBottom: 'calc(10px + 72px)', display: 'flex', gap: 8, alignItems: 'flex-end' }}>
        <input
          value={input} onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && !loading && enviar()}
          placeholder="Pergunte à Rê..."
          style={{ flex: 1, padding: '12px 14px', borderRadius: 22, border: '1.5px solid #E0D8D0', fontSize: 14, color: 'var(--brown)', background: 'var(--cream-light)' }}
        />
        <button onClick={enviar}
          style={{ width: 44, height: 44, borderRadius: '50%', background: input ? 'var(--copper)' : '#E0D8D0', border: 'none', fontSize: 18, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, transition: 'background .2s' }}>
          ➤
        </button>
      </div>
    </div>
  );
}

function NotificacoesScreen({ perfil }) {
  const [permissao, setPermissao] = useState(() => {
    if (!('Notification' in window)) return 'unsupported';
    return Notification.permission;
  });

  const defaultConfig = { aplicacao: true, horarioAplicacao: '09:00', peso: false, horarioPeso: '08:00', diario: false, horarioDiario: '21:00' };
  const [config, setConfig] = useState(() => {
    try {
      const saved = localStorage.getItem('renove_notif');
      return saved ? { ...defaultConfig, ...JSON.parse(saved) } : defaultConfig;
    } catch { return defaultConfig; }
  });

  const salvarConfig = (nova) => {
    setConfig(nova);
    localStorage.setItem('renove_notif', JSON.stringify(nova));
  };
  const toggle = (key) => salvarConfig({ ...config, [key]: !config[key] });

  const pedirPermissao = async () => {
    if (!('Notification' in window)) return;
    const result = await Notification.requestPermission();
    setPermissao(result);
    if (result === 'granted') {
      new Notification('Renove GLP-1 🌿', {
        body: 'Notificações ativadas! Vou te lembrar das aplicações 💉',
      });
    }
  };

  const testarNotificacao = () => {
    if (Notification.permission !== 'granted') return;
    new Notification('Renove GLP-1 💉', {
      body: `Lembrete: hoje é dia da sua aplicação de ${perfil?.dose || '5mg'}! Não esqueça 🌿`,
    });
  };

  // Calcular próxima aplicação
  const dataInicioDate = perfil?.dataInicio ? new Date(perfil.dataInicio + 'T00:00:00') : new Date();
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const diasJornada = Math.max(0, Math.floor((hoje - dataInicioDate) / (1000*60*60*24)));
  const semanaAtual = Math.floor(diasJornada / 7);
  const proximaApl = new Date(dataInicioDate);
  proximaApl.setDate(proximaApl.getDate() + (semanaAtual + 1) * 7);
  const diasRestantes = Math.max(0, Math.ceil((proximaApl - hoje) / (1000*60*60*24)));
  const diasSemanaPT = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const proxDia = diasSemanaPT[proximaApl.getDay()];
  const proxDataStr = `${proximaApl.getDate().toString().padStart(2,'0')}/${(proximaApl.getMonth()+1).toString().padStart(2,'0')}`;

  const ToggleSwitch = ({ on, onToggle }) => (
    <button onClick={onToggle} style={{

  );

  return (
    <div className="screen">
      <div className="header-grad px-5 pt-12 pb-6">
        <h2 style={{ color: 'var(--cream)', fontSize: 22, fontWeight: 700, margin: 0, marginBottom: 4 }}>Notificações 🔔</h2>
        <p style={{ color: 'rgba(245,237,227,0.6)', fontSize: 13, margin: 0 }}>Lembretes da sua jornada</p>
      </div>

      <div className="px-4 py-4 flex flex-col gap-4">

        {/* Status da permissão */}
        {permissao === 'unsupported' && (
          <div style={{ background: '#F5F0EC', borderRadius: 14, padding: 16 }}>
            <div style={{ fontWeight: 700, color: '#8A7060', fontSize: 14 }}>🔕 Notificações não suportadas</div>
            <p style={{ color: '#9A8070', fontSize: 13, margin: '6px 0 0', lineHeight: 1.5 }}>Seu navegador não suporta notificações. Abra o app no Chrome para Android para receber lembretes.</p>

function NumberStepper({ value, onChange, min = 40, max = 300, step = 0.5, unit = 'kg' }) {
  const dec = () => onChange(Math.max(min, parseFloat((+value - step).toFixed(1))));
  const inc = () => onChange(Math.min(max, parseFloat((+value + step).toFixed(1))));
  const btnStyle = { width: 64, height: 64, borderRadius: '50%', border: '2px solid var(--copper-pale)', background: 'white', fontSize: 30, fontWeight: 300, cursor: 'pointer', color: 'var(--brown)', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 2px 14px rgba(196,136,90,0.18)', flexShrink: 0, lineHeight: 1 };
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 24, padding: '12px 0', width: '100%' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 28 }}>
        <button onClick={dec} style={btnStyle}>−</button>
        <div style={{ textAlign: 'center', minWidth: 130 }}>
          <div style={{ fontSize: 72, fontWeight: 800, color: 'var(--brown)', lineHeight: 1, letterSpacing: '-2px' }}>{value}</div>
          <div style={{ fontSize: 20, color: 'var(--copper)', fontWeight: 700, marginTop: 6 }}>{unit}</div>
        </div>
        <button onClick={inc} style={btnStyle}>+</button>
      </div>
      <input type="range" min={min} max={max} step={step} value={value}
        onChange={e => onChange(parseFloat(e.target.value))}
        style={{ width: '76%', accentColor: 'var(--copper)', height: 4 }} />
    </div>
  );
}

    <Wrap>
      <OBHeader title="Qual medicamento GLP-1 você usa?" subtitle="Se não estiver listado, escolha 'Outro'" />
      <div style={{ flex: 1, padding: '16px 24px', display: 'flex', flexDirection: 'column', gap: 10, overflowY: 'auto' }}>
        {medicamentos.map(m => (
          <OptionRow key={m.id} selected={dados.medicamento === m.id} onClick={() => set('medicamento', m.id)} iconName="med-bottle" label={m.label} sublabel={m.sub} />
        ))}
      </div>
      <OBFooter onPress={next} disabled={!dados.medicamento} />
    </Wrap>
  );

  /* ── Step 4: Dose ── */
  if (step === 4) return (
    <Wrap>
      <OBHeader title="Qual é a sua dosagem?" subtitle="Escolha a dose que você usa ou quer usar" />
      <div style={{ flex: 1, padding: '16px 24px', display: 'flex', flexDirection: 'column', gap: 10, overflowY: 'auto' }}>
        {doses.map(d => (
          <OptionRow key={d} selected={dados.dose === d} onClick={() => set('dose', d)} iconName="hourglass" label={d} />
        ))}
      </div>
      <OBFooter onPress={next} />
    </Wrap>
  );

  /* ── Step 5: Data início ── */
  if (step === 5) return (
    <Wrap>
      <OBHeader title="Quando foi sua primeira aplicação?" subtitle="Calculamos sua janela semanal a partir desta data" />
      <div style={{ flex: 1, padding: '20px 24px', overflowY: 'auto' }}>
        <input type="date" value={dados.dataInicio} onChange={e => set('dataInicio', e.target.value)}
          max={new Date().toISOString().split('T')[0]}
          style={{ width: '100%', padding: '16px', borderRadius: 14, fontSize: 16, border: '2px solid var(--copper)', background: 'white', color: 'var(--brown)', fontFamily: 'inherit', outline: 'none', boxSizing: 'border-box', boxShadow: '0 2px 8px rgba(196,136,90,0.15)' }} />
        <div style={{ marginTop: 16, padding: '14px 16px', background: 'var(--copper-pale)', borderRadius: 12, border: '1px solid rgba(196,136,90,0.3)', display: 'flex', gap: 10, alignItems: 'flex-start' }}>
          <span style={{ fontSize: 18, flexShrink: 0 }}>💡</span>
          <p style={{ color: 'var(--brown)', fontSize: 13, margin: 0, lineHeight: 1.5 }}>
            {dados.status === 'iniciando' ? 'Ainda vai começar? Selecione hoje. Você poderá ajustar depois.' : 'Insira a data da sua primeira dose para calcular as próximas aplicações.'}
          </p>
        </div>
      </div>
      <OBFooter onPress={next} disabled={!dados.dataInicio} />
    </Wrap>
  );

  /* ── Step 6: Sexo ── */
  if (step === 6) return (
    <Wrap>
      <OBHeader title="Qual é o seu sexo biológico?" subtitle="Ajuda a personalizar metas e informações de saúde" />
      <div style={{ flex: 1, padding: '20px 24px', display: 'flex', flexDirection: 'column', gap: 12, overflowY: 'auto' }}>
        {[{ id: 'feminino', label: 'Feminino', iconName: 'female' }, { id: 'masculino', label: 'Masculino', iconName: 'male' }, { id: 'outro', label: 'Prefiro não informar', iconName: 'hand-heart' }].map(s => (
          <OptionRow key={s.id} selected={dados.sexo === s.id} onClick={() => set('sexo', s.id)} iconName={s.iconName} label={s.label} />
        ))}
      </div>
      <OBFooter onPress={next} disabled={!dados.sexo} />
    </Wrap>
  );

  /* ── Step 7: Peso início ── */
  if (step === 7) return (
    <Wrap>
      <OBHeader title="Qual era seu peso no início do tratamento?" subtitle="Vamos calcular quanto você já perdeu" />
      <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <NumberStepper value={dados.pesoInicio} onChange={v => set('pesoInicio', v)} min={40} max={300} step={0.5} unit="kg" />
      </div>
      <OBFooter onPress={next} />
    </Wrap>
  );

  /* ── Step 8: Peso atual ── */
  if (step === 8) return (
    <Wrap>
      <OBHeader title="Qual é o seu peso atual?" subtitle="Você pode atualizar sempre na aba Peso" />
      <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <NumberStepper value={dados.pesoAtual} onChange={v => set('pesoAtual', Math.min(v, dados.pesoInicio))} min={40} max={dados.pesoInicio} step={0.5} unit="kg" />
      </div>
      <OBFooter onPress={next} />
    </Wrap>
  );

  /* ── Step 9: Meta de peso ── */
  if (step === 9) return (
    <Wrap>
      <OBHeader title="Qual é a sua meta de peso?" subtitle="Seu objetivo personaliza suas projeções" />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 20 }}>
        <NumberStepper value={dados.meta} onChange={v => set('meta', Math.min(v, Math.max(40, dados.pesoAtual - 0.5)))} min={40} max={Math.max(41, dados.pesoAtual - 0.5)} step={0.5} unit="kg" />
        {dados.pesoAtual > dados.meta && (
          <div style={{ background: 'var(--copper-pale)', borderRadius: 14, padding: '12px 32px', textAlign: 'center', border: '1px solid rgba(196,136,90,0.3)' }}>
            <div style={{ color: 'var(--copper)', fontWeight: 800, fontSize: 24 }}>−{(dados.pesoAtual - dados.meta).toFixed(1)} kg</div>
            <div style={{ color: 'var(--brown-light)', fontSize: 12, marginTop: 2 }}>meta de perda de peso</div>
          </div>
        )}
      </div>
      <OBFooter onPress={next} />
    </Wrap>
  );

  /* ── Step 10: Objetivos ── */
  if (step === 10) return (
    <Wrap>
      <OBHeader title="Quais são seus objetivos?" subtitle="Selecione todos que se aplicam a você" />
      <div style={{ flex: 1, padding: '16px 24px', display: 'flex', flexDirection: 'column', gap: 10, overflowY: 'auto' }}>
        {objetivos.map(o => {
          const sel = dados.objetivos.includes(o.id);
          return (
            <button key={o.id} onClick={() => toggleObj(o.id)} style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '14px 16px', borderRadius: 14, border: `2px solid ${sel ? 'var(--copper)' : 'rgba(45,31,20,0.1)'}`, background: sel ? 'rgba(196,136,90,0.08)' : 'white', cursor: 'pointer', textAlign: 'left', transition: 'all .15s', width: '100%', boxShadow: sel ? '0 2px 10px rgba(196,136,90,0.18)' : '0 1px 3px rgba(45,31,20,0.04)' }}>
              <div style={{ width: 40, height: 40, borderRadius: 11, background: sel ? 'rgba(196,136,90,0.15)' : '#F5F0EC', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, transition: 'background .15s' }}>
                <Icon name={o.iconName} size={20} color={sel ? 'var(--copper)' : '#9A8070'} strokeWidth={1.8} />
              </div>
              <span style={{ flex: 1, fontWeight: 600, color: 'var(--brown)', fontSize: 15 }}>{o.label}</span>
              <CheckSquare on={sel} />
            </button>
          );
        })}
      </div>
      <OBFooter onPress={next} disabled={dados.objetivos.length === 0} label="Ver meu plano →" />
    </Wrap>
  );

  /* ── Step 11: Plano Personalizado ── */
  if (step === 11) {
    const perda = Math.max(0, dados.pesoAtual - dados.meta).toFixed(1);
    const medLabel = medicamentos.find(m => m.id === dados.medicamento)?.label || dados.medicamento;
    return (
      <Wrap>
        <div style={{ flex: 1, overflowY: 'auto' }}>
          {/* Header do plano — usa o dark gradient do app */}
          <div className="header-grad" style={{ padding: '52px 24px 32px', textAlign: 'center' }}>
            <div style={{ width: 76, height: 76, borderRadius: '50%', background: 'rgba(196,136,90,0.2)', border: '3px solid var(--copper)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px', fontSize: 32 }}>🎯</div>
            <h2 style={{ fontSize: 24, fontWeight: 800, color: 'var(--cream)', margin: '0 0 8px', letterSpacing: '-0.5px' }}>Seu Plano Personalizado</h2>
            <p style={{ color: 'rgba(245,237,227,0.65)', fontSize: 14, margin: 0 }}>Tudo pronto, {dados.nome || 'você'}! Aqui está seu resumo:</p>
          </div>
          <div style={{ padding: '20px 24px', display: 'flex', flexDirection: 'column', gap: 10, background: 'var(--cream-light)' }}>
            {[
              { label: 'Medicamento', valor: medLabel, icon: '💊' },
              { label: 'Dose atual', valor: dados.dose, icon: '📏' },
              { label: 'Peso no início', valor: `${dados.pesoInicio} kg`, icon: '⚖️' },
              { label: 'Peso atual', valor: `${dados.pesoAtual} kg`, icon: '📍' },
              { label: 'Meta de peso', valor: `${dados.meta} kg`, icon: '🎯' },
              { label: 'Perda esperada', valor: `−${perda} kg`, icon: '📉' },
            ].map(item => (
              <div key={item.label} style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '13px 16px', background: 'white', borderRadius: 12, border: '1px solid rgba(196,136,90,0.12)', boxShadow: '0 1px 4px rgba(45,31,20,0.05)' }}>
                <span style={{ fontSize: 20, flexShrink: 0 }}>{item.icon}</span>
                <span style={{ flex: 1, color: 'var(--brown-light)', fontSize: 14, opacity: 0.75 }}>{item.label}</span>
                <span style={{ color: 'var(--brown)', fontWeight: 700, fontSize: 15 }}>{item.valor}</span>
              </div>
            ))}
          </div>
        </div>
        <div style={{ padding: '16px 24px 40px', background: 'var(--cream-light)', borderTop: '1px solid rgba(196,136,90,0.18)', flexShrink: 0 }}>
          <button className="btn-primary" onClick={salvar}>Começar minha jornada 🌿</button>
        </div>
      </Wrap>
    );
  }

  return null;
}

/* ─── NAVEGAÇÃO ──────────────────────────────────────────── */
const TABS = [
  { id: 'home',       label: 'Home',      icon: 'home' },
  { id: 'planejador', label: 'Picadinha', icon: 'syringe' },
  { id: 'diario',     label: 'Diário',    icon: 'book-open' },
  { id: 'peso',       label: 'Peso',      icon: 'scale' },
  { id: 'rê',         label: 'Rê',        icon: 'message-circle' },
];

/* ─── APP ROOT ───────────────────────────────────────────── */
function App() {
  const [tab, setTab] = useState('home');
  const [perfil, setPerfil] = useState(() => {
    try {
      const saved = localStorage.getItem('renove_perfil');
      return saved ? JSON.parse(saved) : null;
    } catch { return null; }
  });

  // Disparar notificação do navegador ao abrir o app no dia da aplicação
  useEffect(() => {
    if (!perfil || !('Notification' in window) || Notification.permission !== 'granted') return;
    const cfg = (() => { try { return JSON.parse(localStorage.getItem('renove_notif') || '{}'); } catch { return {}; } })();
    if (cfg.aplicacao === false) return;

    const dataInicioDate = perfil.dataInicio ? new Date(perfil.dataInicio + 'T00:00:00') : null;
    if (!dataInicioDate) return;
    const hoje = new Date(); hoje.setHours(0,0,0,0);
    const diasJornada = Math.max(0, Math.floor((hoje - dataInicioDate) / (1000*60*60*24)));
    const semanaAtual = Math.floor(diasJornada / 7);
    const proximaApl = new Date(dataInicioDate);
    proximaApl.setDate(proximaApl.getDate() + (semanaAtual + 1) * 7);
    const diasRestantes = Math.max(0, Math.ceil((proximaApl - hoje) / (1000*60*60*24)));

    if (diasRestantes === 0) {
      const hoje2 = new Date().toISOString().split('T')[0];
      const ultimaNotif = localStorage.getItem('renove_ultima_notif');
      if (ultimaNotif !== hoje2) {
        new Notification('Renove GLP-1 💉', {
          body: `Hoje é dia da sua aplicação de ${perfil.dose || '5mg'}! Não esqueça 🌿`,
        });
        localStorage.setItem('renove_ultima_notif', hoje2);
      }
    }
  }, [perfil]);

  // Primeiro acesso → mostrar onboarding
  if (!perfil) {
    return <OnboardingScreen onComplete={p => setPerfil(p)} />;
  }

  const screens = {
    home: <HomeScreen setTab={setTab} perfil={perfil} />,
    planejador: <PlanejadorScreen />,
    diario: <DiarioScreen />,
    peso: <PesoScreen perfil={perfil} />,
    rê: <ReScreen />,
    calculadora: <CalculadoraScreen />,
    fotos: <FotosScreen />,
    notificacoes: <NotificacoesScreen perfil={perfil} />,
  };

  return (
    <>
      {/* Tela atual */}
      <div style={{ position: 'absolute', inset: 0, bottom: 72 }}>
        {tab === 'rê' ? screens['rê'] : (
          <div className="screen">
            {screens[tab] || screens['home']}
          </div>
        )}
      </div>

      {/* Bottom Nav */}
      <div className="bottom-nav">
        {TABS.map(t => {
          const active = tab === t.id;
          return (
            <button key={t.id} className={`nav-btn${active ? ' active' : ''}`} onClick={() => setTab(t.id)}>
              <div className="nav-icon-pill">
                <Icon name={t.icon} size={22}
                  color={active ? 'var(--copper)' : 'rgba(245,237,227,0.35)'}
                  strokeWidth={active ? 2.5 : 1.8} />
              </div>
              <span className="label">{t.label}</span>
            </button>
          );
        })}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
