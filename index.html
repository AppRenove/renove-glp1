    :root {

      --copper-light: #DCAA78;
      --copper-pale:  #F2DFC8;
      --cream:        #F5EDE3;
      --cream-light:  #FAF6F1;
      --cream-mid:    #F0E8DE;
      --red:          #C0392B;
      --yellow:       #C47A00;
      --green:        #2E7D52;

      --shadow-sm:    0 1px 4px rgba(45,31,20,0.06), 0 2px 8px rgba(45,31,20,0.04);
      --shadow-md:    0 4px 20px rgba(45,31,20,0.09), 0 1px 4px rgba(45,31,20,0.05);
      --shadow-lg:    0 8px 32px rgba(45,31,20,0.13), 0 2px 8px rgba(45,31,20,0.06);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      background: #120D07;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex; justify-content: center; align-items: center; min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    #root { width: 100%; max-width: 430px; height: 100dvh; overflow: hidden; position: relative; background: var(--cream-light); }
    .screen { position: absolute; inset: 0; overflow-y: auto; overflow-x: hidden; padding-bottom: 84px; }
    .screen::-webkit-scrollbar { display: none; }

    /* ── Bottom Nav ── */
    .bottom-nav {
      position: absolute; bottom: 0; left: 0; right: 0; height: 76px;
      background: linear-gradient(180deg, #251608 0%, #1A0E04 100%);
      z-index: 50; display: flex;
      border-top: 1px solid rgba(196,136,90,0.15);
      box-shadow: 0 -12px 40px rgba(0,0,0,0.35);
    }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; border: none; background: none; cursor: pointer; padding: 8px 0; transition: transform .15s; }
    .nav-btn:active { transform: scale(0.88); }
    .nav-icon-pill { padding: 5px 16px; border-radius: 12px; transition: background .2s; }
    .nav-btn.active .nav-icon-pill { background: rgba(196,136,90,0.18); }
    .nav-btn .label { font-size: 10px; font-weight: 600; letter-spacing: 0.3px; font-family: 'Inter', sans-serif; }
    .nav-btn.active .label { color: var(--copper-light); }
    .nav-btn:not(.active) .label { color: rgba(245,237,227,0.3); }

    /* ── Cards ── */
    .card {
      background: white;
      border-radius: 20px;
      padding: 18px;
      box-shadow: var(--shadow-md);
      border: 1px solid rgba(45,31,20,0.055);
    }
    .card-elevated {
      background: white;
      border-radius: 20px;
      padding: 18px;
      box-shadow: var(--shadow-lg);
      border: 1px solid rgba(45,31,20,0.06);
    }

    /* ── Buttons ── */
    .btn-primary {
      background: linear-gradient(135deg, #C98B5E 0%, #A86535 100%);
      color: white; border: none; border-radius: 16px;
      padding: 15px 24px; font-size: 15px; font-weight: 700;
      cursor: pointer; width: 100%; letter-spacing: 0.15px;
      transition: opacity .15s, transform .1s, box-shadow .15s;
      box-shadow: 0 4px 16px rgba(168,101,53,0.4), 0 1px 3px rgba(168,101,53,0.3);
      font-family: 'Inter', sans-serif;
    }
    .btn-primary:hover { box-shadow: 0 6px 20px rgba(168,101,53,0.45); }
    .btn-primary:active { opacity: 0.9; transform: scale(0.985); box-shadow: 0 2px 8px rgba(168,101,53,0.3); }
    .btn-outline {
      background: transparent; color: var(--copper);
      border: 1.5px solid rgba(196,136,90,0.6);
      border-radius: 14px; padding: 11px 20px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all .15s; font-family: 'Inter', sans-serif;
    }
    .btn-outline:active { background: rgba(196,136,90,0.08); }

    /* ── Header gradient ── */
    .header-grad {
      background: linear-gradient(160deg, #1A0D05 0%, #2D1F14 50%, #3A2418 100%);
    }

    /* ── Inputs ── */
    input, select, textarea { outline: none; font-family: 'Inter', sans-serif; }
    input:focus, select:focus { border-color: var(--copper) !important; box-shadow: 0 0 0 3px rgba(196,136,90,0.12) !important; }
    input::placeholder { color: #B8A898; }

    /* ── Pills ── */
    .pill {
      display: inline-flex; align-items: center;
      padding: 4px 11px; border-radius: 20px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.1px;
    }

    /* ── Chat bubbles ── */
    .chat-bubble-rê { background: white; border-radius: 20px 20px 20px 4px; box-shadow: var(--shadow-sm); }
    .chat-bubble-user { background: linear-gradient(135deg, var(--copper), #A86535); color: white; border-radius: 20px 20px 4px 20px; }

    /* ── Severity buttons in Diário ── */
    .sev-btn {
      flex: 1; padding: 9px 2px; border-radius: 10px;
      font-size: 11px; font-weight: 700; cursor: pointer;
      border: 1.5px solid transparent; transition: all .15s;
      font-family: 'Inter', sans-serif; letter-spacing: 0.1px;
    }
    .sev-btn.none-sel   { background: var(--copper-pale); color: var(--brown-light); border-color: rgba(196,136,90,0.4); }
    .sev-btn.leve-sel   { background: #FFF3CD; color: #8A5E00; border-color: rgba(212,160,23,0.5); }
    .sev-btn.mod-sel    { background: #FFE4C4; color: #8B4513; border-color: rgba(196,120,60,0.5); }
    .sev-btn.intense-sel{ background: #FDECEA; color: var(--red); border-color: rgba(192,57,43,0.4); }
    .sev-btn.unsel      { background: #F5F0EB; color: #9A8070; border-color: transparent; }

    /* ── Status indicators ── */
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }

    /* ── Animations ── */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.55} }
    .pulse { animation: pulse 2s infinite; }
    @keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .slide-up { animation: slideUp .3s cubic-bezier(.22,1,.36,1) both; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .fade-in { animation: fadeIn .25s ease both; }
    @keyframes bellRing { 0%,100%{transform:rotate(0)} 20%{transform:rotate(12deg)} 40%{transform:rotate(-12deg)} 60%{transform:rotate(6deg)} 80%{transform:rotate(-4deg)} }
    .bell-ring { animation: bellRing .6s ease; }

    /* ── Rê FAB ── */
    .re-fab {
      position: absolute;
      right: 18px;
      bottom: 96px;
      z-index: 60;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      padding: 0;
      background: linear-gradient(145deg, #C98B5E 0%, #8B4E1E 100%);
      box-shadow: 0 6px 24px rgba(140,74,30,0.5), 0 2px 8px rgba(140,74,30,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
      transition: transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s;
      display: flex; align-items: center; justify-content: center;
    }
    .re-fab:active {
      transform: scale(0.88) !important;
      box-shadow: 0 3px 12px rgba(140,74,30,0.4);
    }
    .re-fab:hover { transform: scale(1.07); }
    .re-fab-inner {
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
    }
    .re-fab-label {
      font-family: 'Inter', sans-serif;
      font-size: 9px; font-weight: 800;
      color: rgba(255,255,255,0.9);
      letter-spacing: 0.5px;
      line-height: 1;
    }
    /* Ping dot */
    .re-fab-ping {
      position: absolute;
      top: 3px; right: 3px;
      width: 11px; height: 11px;
      border-radius: 50%;
      background: #4CAF7A;
      border: 2px solid white;
      box-shadow: 0 0 0 0 rgba(76,175,122,0.4);
      animation: rePing 2.5s ease-in-out infinite;
    }
    @keyframes rePing {
      0%   { box-shadow: 0 0 0 0 rgba(76,175,122,0.5); }
      60%  { box-shadow: 0 0 0 6px rgba(76,175,122,0); }
      100% { box-shadow: 0 0 0 0 rgba(76,175,122,0); }
    }
    /* Entrada suave */
    @keyframes fabIn {
      from { opacity: 0; transform: scale(0.5) translateY(12px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .re-fab { animation: fabIn .4s cubic-bezier(.34,1.56,.64,1) both; }

const MSGS_INICIAIS = [
  { de: 'rê', texto: 'Oi! Eu sou a Rê 🌿\n\nSua especialista em GLP-1 aqui no Renove. Pode me perguntar sobre aplicações, doses, efeitos colaterais, alimentação ou qualquer dúvida da sua jornada.' },
];

// Chave configurada via painel de configurações do app
const OPENAI_KEY = window.__RENOVE_API_KEY__ || '';

function buildSistemaRe(perfil) {
  const nome = perfil?.nome ? `O usuário se chama ${perfil.nome}.` : '';
  const med = perfil?.medicamento ? `Usa ${perfil.medicamento}` : 'Usa medicamento GLP-1';
  const dose = perfil?.dose ? ` na dose atual de ${perfil.dose}.` : '.';
  const conc = perfil?.concentracaoAmpola && perfil.concentracaoAmpola !== 'nao-sei'
    ? ` Ampola com concentração de ${perfil.concentracaoAmpola}.` : '';
  const inicio = perfil?.dataInicio ? ` Em tratamento desde ${new Date(perfil.dataInicio).toLocaleDateString('pt-BR')}.` : '';

  return `Você é a Rê, especialista em GLP-1 do app Renove. ${nome} ${med}${dose}${conc}${inicio}

CONTEXTO DO USUÁRIO: Paciente brasileiro em tratamento com GLP-1 manipulado (Tirzepatida, Semaglutida, T.G, Lipoless ou similar). Pode usar caneta ou seringa de insulina com frasco multidose.

REGRAS DE RESPOSTA (CRÍTICO):
- Máximo 4 linhas por resposta. Seja direta e objetiva.
- Use listas com • apenas quando listar 3+ itens práticos.
- Nunca repita o que o usuário disse. Vá direto ao ponto.
- Tom: amiga especialista, não médica formal, não robô.
- Um emoji no máximo por mensagem, só se ajudar.
- Se a pergunta for vaga, responda o caso mais provável e ofereça opções.

CONHECIMENTO TÉCNICO GLP-1:
Tirzepatida (doses: 2,5 / 5 / 7,5 / 10 / 12,5 / 15mg) — agonista duplo GIP+GLP-1
Semaglutida (doses: 0,25 / 0,5 / 1 / 1,7 / 2,4mg) — agonista GLP-1

JANELA DE DOSE: ±3 dias da data prevista é seguro. Esqueceu há menos de 3 dias → aplique agora. Passou de 3 dias → espere a data original da próxima semana.

LOCAIS DE APLICAÇÃO: Abdômen (5cm do umbigo), coxa (lateral), braço (lateral). Rotacionar sempre. Não aplicar no mesmo local por 2 semanas seguidas.

TÉCNICA DE APLICAÇÃO (seringa de insulina com frasco):
• Higienize o local com álcool, aguarde secar
• Pegue prega de pele com 2 dedos
• Introduza agulha 45°-90° conforme espessura de gordura
• Injete devagar, aguarde 5s, remova
• Não esfregue após aplicar

EFEITOS COLATERAIS COMUNS E MANEJO:
Náusea/enjoo → comer devagar, porções menores, evitar gordurosos. Piora noturna? Aplique de manhã.
Vômito persistente (+24h) → contatar médico.
Constipação → mais água, fibras, caminhada leve.
Diarreia → hidratação, BRAT diet (banana, arroz, maçã, torrada).
Fadiga nas primeiras semanas → normal, passa com adaptação.
Queda de cabelo → proteína insuficiente. Meta: 1,2-1,6g/kg de peso.
Refluxo → não deitar por 2h após refeições, refeições menores.

ALIMENTAÇÃO NO GLP-1:
Meta proteína: 1,2-1,6g/kg (ESSENCIAL para preservar músculo)
Prioridade: proteína + vegetais + fibras. Evitar: ultraprocessados, bebida alcoólica.
Hidratação: mínimo 2L/dia. Déficit hídrico piora enjoos.
Comer devagar e mastigar bem — saciedade do GLP-1 é ampliada.

PLATEAU DE PESO: Normal após 8-12 semanas. Causas: adaptação metabólica, retenção hídrica, pouco músculo. Solução: revisar proteína, adicionar treino de força.

COMPOSIÇÃO CORPORAL: GLP-1 sem treino de força → até 30-40% da perda pode ser músculo. Com treino de força + proteína adequada → preserva 80%+ de massa magra.

CÁLCULO DE DOSE NA SERINGA (para frascos manipulados, seringa U100):
Fórmula: UI a puxar = (dose em mg ÷ concentração em mg/ml) × 100
Exemplos:
• Ampola 10mg/ml, dose 5mg → 5 ÷ 10 × 100 = 50 UI
• Ampola 15mg/ml, dose 7,5mg → 7,5 ÷ 15 × 100 = 50 UI
• Ampola 5mg/ml, dose 2,5mg → 2,5 ÷ 5 × 100 = 50 UI
Se o usuário perguntar "quantas UI puxar" e você souber a concentração e a dose, calcule direto.

SITUAÇÕES QUE REQUEREM MÉDICO: Pancreatite (dor intensa no abdômen irradiando para costas), vômitos >24h, alergia grave, frequência cardíaca muito elevada em repouso.

Idioma: sempre português brasileiro. Nunca substitua orientação médica para sintomas graves.`;
}

/* ─── SVG CHART ──────────────────────────────────────────── */
function WeightChart({ dados, meta }) {
  const W = 340, H = 160, PAD = { top: 20, right: 20, bottom: 30, left: 40 };
  const chartW = W - PAD.left - PAD.right;
  const chartH = H - PAD.top - PAD.bottom;
  const minP = Math.min(...dados.map(d => d.peso)) - 1;
  const maxP = Math.max(...dados.map(d => d.peso)) + 1;
  const scaleX = i => PAD.left + (i / (dados.length - 1)) * chartW;
  const scaleY = v => PAD.top + (1 - (v - minP) / (maxP - minP)) * chartH;
  const pts = dados.map((d, i) => `${scaleX(i)},${scaleY(d.peso)}`).join(' ');
  const area = `M ${scaleX(0)},${scaleY(dados[0].peso)} ` +
    dados.slice(1).map((d, i) => `L ${scaleX(i+1)},${scaleY(d.peso)}`).join(' ') +
    ` L ${scaleX(dados.length-1)},${PAD.top + chartH} L ${PAD.left},${PAD.top + chartH} Z`;

  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ overflow: 'visible' }}>
      <defs>
        <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#C4885A" stopOpacity="0.25" />
          <stop offset="100%" stopColor="#C4885A" stopOpacity="0.02" />
        </linearGradient>
      </defs>
      {/* Grid lines */}
      {[0,0.25,0.5,0.75,1].map(t => (
        <line key={t} x1={PAD.left} y1={PAD.top + t * chartH} x2={W - PAD.right} y2={PAD.top + t * chartH}
          stroke="#E8E0D8" strokeWidth="1" />
      ))}
      {/* Area */}
      <path d={area} fill="url(#chartGrad)" />
      {/* Line */}
      <polyline points={pts} fill="none" stroke="#C4885A" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
      {/* Dots */}
      {dados.map((d, i) => (
        <circle key={i} cx={scaleX(i)} cy={scaleY(d.peso)} r={i === dados.length - 1 ? 5 : 3}
          fill={i === dados.length - 1 ? '#C4885A' : 'white'} stroke="#C4885A" strokeWidth="2" />
      ))}
      {/* Labels X — mostrar só início, meio e fim */}
      {[0, Math.floor(dados.length/2), dados.length-1].map(i => (
        <text key={i} x={scaleX(i)} y={H - 4} textAnchor="middle" fontSize="9" fill="#9A8070">{dados[i].data}</text>
      ))}
      {/* Labels Y */}
      {[minP+1, (minP+maxP)/2, maxP-1].map((v, i) => (
        <text key={i} x={PAD.left - 6} y={scaleY(v) + 4} textAnchor="end" fontSize="9" fill="#9A8070">{Math.round(v)}</text>
      ))}
    </svg>
  );
}

          ].map(a => (
            <button key={a.tab} onClick={() => setTab(a.tab)}
              style={{ flex: 1, background: 'white', borderRadius: 16, padding: '16px 8px', boxShadow: '0 2px 14px rgba(45,31,20,0.07)', cursor: 'pointer', border: '1px solid rgba(45,31,20,0.04)', textAlign: 'center' }}>
              <div style={{ width: 44, height: 44, borderRadius: 14, background: a.bg, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 8px' }}>
                <Icon name={a.icon} size={22} color={a.cor} strokeWidth={2} />
              </div>
              <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--brown-light)', lineHeight: 1.3, whiteSpace: 'pre-line' }}>{a.label}</div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ─── TELA: PLANEJADOR ───────────────────────────────────── */
function PlanejadorScreen({ perfil }) {
  // ── Aplicações salvas no localStorage ──
  const [aplicacoes, setAplicacoes] = useState(() => {
    try { return JSON.parse(localStorage.getItem('renove_aplicacoes') || '[]'); } catch { return []; }
  });
  const [showModal, setShowModal] = useState(false);
  const [localSel, setLocalSel] = useState(0);
  const [doseInput, setDoseInput] = useState('');

  // ── Calcular datas ──
  const hoje = new Date();
  const dataInicio = perfil?.dataInicio ? new Date(perfil.dataInicio) : null;
  const dosePerfil = perfil?.dose || '';

  let diasJornada = 0, semanaAtual = 0, proxData = null, diasRest = null;
  if (dataInicio) {
    diasJornada = Math.floor((hoje - dataInicio) / 86400000);
    semanaAtual = Math.floor(diasJornada / 7);
    proxData = new Date(dataInicio);
    proxData.setDate(dataInicio.getDate() + (semanaAtual + 1) * 7);
    diasRest = Math.ceil((proxData - hoje) / 86400000);
  }

  // ── Verificar se já aplicou esta semana ──
  const inicioSemana = dataInicio ? new Date(dataInicio) : null;
  if (inicioSemana) inicioSemana.setDate(dataInicio.getDate() + semanaAtual * 7);
  const fimSemana = inicioSemana ? new Date(inicioSemana) : null;
  if (fimSemana) fimSemana.setDate(inicioSemana.getDate() + 7);

  const aplicacaoSemana = aplicacoes.find(a => {
    const d = new Date(a.ts);
    return inicioSemana && fimSemana && d >= inicioSemana && d < fimSemana;
  });

  // ── Rodízio inteligente ──
  const ultimoLocal = aplicacoes.length > 0 ? aplicacoes[aplicacoes.length - 1].local : null;
  const sugIdx = ultimoLocal
    ? (LOCAIS.indexOf(ultimoLocal) + 1) % LOCAIS.length
    : 0;

  // ── Calendário da semana atual ──
  const diaSemana = hoje.getDay();
  const inicioSem7 = new Date(hoje);
  inicioSem7.setDate(hoje.getDate() - diaSemana);
  const letras = ['D', 'S', 'T', 'Q', 'Q', 'S', 'S'];
  const mesesPT = ['jan', 'fev', 'mar', 'abr', 'mai', 'jun', 'jul', 'ago', 'set', 'out', 'nov', 'dez'];
  const diasCal = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(inicioSem7);
    d.setDate(inicioSem7.getDate() + i);
    const isHoje = d.toDateString() === hoje.toDateString();
    const passado = d < hoje && !isHoje;
    const isInjecao = proxData && d.toDateString() === proxData.toDateString();
    const foiAplicado = aplicacoes.some(a => new Date(a.ts).toDateString() === d.toDateString());
    return { letra: letras[i], num: d.getDate(), passado, isHoje, isInjecao, foiAplicado };
  });

  // ── Formatters ──
  const diasSemPT = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const fmtData = (d) => d ? `${diasSemPT[d.getDay()]}, ${d.getDate()}/${String(d.getMonth()+1).padStart(2,'0')}` : '–';
  const fmtDataHist = (iso) => { const d = new Date(iso); return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`; };

  // ── Registrar ──
  const registrar = () => {
    const nova = {
      data: hoje.toISOString().split('T')[0],
      local: LOCAIS[localSel],
      dose: doseInput || dosePerfil || '–',
      ts: new Date().toISOString(),
    };
    const novas = [...aplicacoes, nova];
    setAplicacoes(novas);
    localStorage.setItem('renove_aplicacoes', JSON.stringify(novas));
    setShowModal(false);
  };

  const janelaValida = diasRest !== null && diasRest <= 4;
  const historico = [...aplicacoes].reverse().slice(0, 8);

  return (
    <div className="screen">
      <div className="header-grad px-5 pt-12 pb-6">
        <h2 style={{ color: 'var(--cream)', fontSize: 22, fontWeight: 800, margin: 0, marginBottom: 4, letterSpacing: '-0.3px' }}>Planejador</h2>
        <p style={{ color: 'rgba(245,237,227,0.6)', fontSize: 13, margin: 0 }}>Sua picadinha semanal</p>
      </div>

      <div className="px-4 py-4 flex flex-col gap-4">
        {/* Countdown */}
        {dataInicio ? (
          <div className="card" style={{ background: 'linear-gradient(135deg, var(--brown) 0%, var(--brown-mid) 100%)', color: 'white' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
              <div>
                <p style={{ color: 'rgba(245,237,227,0.6)', fontSize: 13, margin: 0 }}>Próxima aplicação</p>
                <p style={{ color: 'var(--cream)', fontSize: 24, fontWeight: 800, margin: '4px 0' }}>{fmtData(proxData)}</p>
                <span className="pill" style={{ background: 'rgba(196,136,90,0.25)', color: 'var(--copper-light)', marginTop: 4, display: 'inline-flex' }}>
                  {diasRest > 0 ? `⏰ ${diasRest} dia${diasRest !== 1 ? 's' : ''} restante${diasRest !== 1 ? 's' : ''}` : diasRest === 0 ? '📍 Hoje!' : '⚠️ Atrasado'}
                </span>
              </div>
              <div style={{ textAlign: 'center' }}>
                <div style={{ fontSize: 40, fontWeight: 900, color: 'var(--copper-light)', lineHeight: 1 }}>{diasRest > 0 ? diasRest : 0}</div>
                <div style={{ fontSize: 11, color: 'rgba(245,237,227,0.5)' }}>dias</div>
              </div>
            </div>
            {janelaValida && (
              <div style={{ marginTop: 12, padding: '10px 14px', background: 'rgba(196,136,90,0.15)', borderRadius: 10, fontSize: 13, color: 'rgba(245,237,227,0.8)' }}>
                🕐 Janela aberta — você pode aplicar agora!
              </div>
            )}
          </div>
        ) : (
          <div className="card" style={{ textAlign: 'center', padding: 24 }}>
            <div style={{ fontSize: 32, marginBottom: 8 }}>📅</div>
            <div style={{ fontWeight: 700, color: 'var(--brown)', fontSize: 15 }}>Complete seu perfil</div>
            <div style={{ color: '#9A8070', fontSize: 13, marginTop: 4 }}>Informe a data de início para ver o planejamento.</div>
          </div>
        )}

        {/* Mini calendário */}
        <div className="card">
          <div style={{ fontWeight: 700, color: 'var(--brown)', fontSize: 15, marginBottom: 12 }}>
            Semana de {diasCal[0].num}/{String(hoje.getMonth()+1).padStart(2,'0')} — {mesesPT[hoje.getMonth()]}
          </div>
          <div style={{ display: 'flex', gap: 6 }}>
            {diasCal.map((d, i) => (
              <div key={i} style={{
                flex: 1, textAlign: 'center', borderRadius: 10, padding: '8px 4px',
                background: d.foiAplicado ? 'var(--copper)' : d.isInjecao ? '#FFF3E0' : d.isHoje ? 'var(--copper-pale)' : d.passado ? '#F5F0EC' : 'white',
                border: d.isHoje ? '2px solid var(--copper)' : d.isInjecao ? '2px solid var(--copper)' : '2px solid transparent',
              }}>
                <div style={{ fontSize: 10, color: d.foiAplicado ? 'rgba(255,255,255,0.7)' : '#9A8070', marginBottom: 3 }}>{d.letra}</div>
                <div style={{ fontWeight: 700, fontSize: 14, color: d.foiAplicado ? 'white' : d.isHoje ? 'var(--copper)' : 'var(--brown)' }}>{d.num}</div>
                {d.foiAplicado && <div style={{ fontSize: 14, marginTop: 2 }}>💉</div>}
                {d.isInjecao && !d.foiAplicado && <div style={{ fontSize: 14, marginTop: 2 }}>📍</div>}
                {d.isHoje && !d.foiAplicado && !d.isInjecao && <div style={{ width: 6, height: 6, borderRadius: 3, background: 'var(--copper)', margin: '3px auto 0' }} />}
              </div>
            ))}
          </div>
        </div>

        {/* Rodízio / botão registrar */}
        {aplicacaoSemana ? (
          <div style={{ background: '#E8F8EE', border: '1.5px solid var(--green)', borderRadius: 14, padding: 16, textAlign: 'center' }}>
            <div style={{ fontSize: 28, marginBottom: 6 }}>🎉</div>
            <div style={{ fontWeight: 700, color: '#2E7D52', fontSize: 15 }}>Aplicação da semana registrada!</div>
            <div style={{ color: '#4CAF7A', fontSize: 13, marginTop: 4 }}>
              Local: {aplicacaoSemana.local} · Dose: {aplicacaoSemana.dose}
            </div>
          </div>
        ) : (
          <>
            <div className="card">
              <div style={{ fontWeight: 700, color: 'var(--brown)', fontSize: 15, marginBottom: 4 }}>Local sugerido pelo rodízio</div>
              <p style={{ color: '#8A7060', fontSize: 13, margin: '0 0 12px' }}>
                {ultimoLocal ? `Último: ${ultimoLocal}` : 'Ainda sem histórico — começando pelo abdômen'}
              </p>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                {LOCAIS.map((l, i) => (
                  <button key={l}
                    style={{
                      padding: '8px 14px', borderRadius: 20, fontSize: 13, fontWeight: 500, cursor: 'default',
                      background: sugIdx === i ? 'var(--copper)' : '#F5F0EC',
                      color: sugIdx === i ? 'white' : 'var(--brown-light)',
                      border: 'none',
                    }}>{l}</button>
                ))}
              </div>
            </div>

            {janelaValida ? (
              <button className="btn-primary" onClick={() => { setLocalSel(sugIdx); setDoseInput(dosePerfil); setShowModal(true); }} style={{ fontSize: 16, padding: '16px' }}>
                💉 Registrar aplicação
              </button>
            ) : dataInicio ? (
              <div style={{ background: 'var(--copper-pale)', borderRadius: 14, padding: '14px 16px', textAlign: 'center', color: '#8A7060', fontSize: 14 }}>
                A janela de aplicação abre em {Math.max(0, (diasRest || 0) - 4)} dia{(diasRest || 0) - 4 !== 1 ? 's' : ''}
              </div>
            ) : null}
          </>
        )}

        {/* Histórico */}
        <div>
          <div style={{ fontWeight: 700, color: 'var(--brown)', fontSize: 15, marginBottom: 10 }}>Histórico de aplicações</div>
          {historico.length === 0 ? (
            <div style={{ textAlign: 'center', color: '#9A8070', fontSize: 14, padding: '20px 0' }}>Nenhuma aplicação registrada ainda.</div>
          ) : (
            <div className="flex flex-col gap-2">
              {historico.map((h, i) => (
                <div key={i} style={{ background: 'white', borderRadius: 12, padding: '12px 14px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', boxShadow: '0 1px 6px rgba(45,31,20,0.05)' }}>
                  <div className="flex items-center gap-3">
                    <div style={{ width: 36, height: 36, borderRadius: 10, background: 'var(--copper-pale)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18 }}>💉</div>
                    <div>
                      <div style={{ fontWeight: 600, fontSize: 14, color: 'var(--brown)' }}>{h.local}</div>
                      <div style={{ fontSize: 12, color: '#9A8070' }}>{fmtDataHist(h.ts)}</div>
                    </div>
                  </div>
                  <span className="pill" style={{ background: 'var(--copper-pale)', color: 'var(--brown-light)' }}>{h.dose}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* Modal de registro */}
      {showModal && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(45,31,20,0.55)', zIndex: 200, display: 'flex', alignItems: 'flex-end' }}>
          <div style={{ background: 'var(--cream-light)', borderRadius: '20px 20px 0 0', padding: '24px 20px 32px', width: '100%', maxHeight: '80vh', overflowY: 'auto' }}>
            <div style={{ fontWeight: 700, color: 'var(--brown)', fontSize: 18, marginBottom: 4 }}>Registrar aplicação</div>
            <p style={{ color: '#8A7060', fontSize: 13, margin: '0 0 20px' }}>Confirme os dados da aplicação de hoje</p>

            <div style={{ fontWeight: 600, color: 'var(--brown)', fontSize: 14, marginBottom: 8 }}>Local de aplicação</div>
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 20 }}>
              {LOCAIS.map((l, i) => (
                <button key={l} onClick={() => setLocalSel(i)}
                  style={{ padding: '8px 14px', borderRadius: 20, fontSize: 13, fontWeight: 500, cursor: 'pointer', background: localSel === i ? 'var(--copper)' : '#F0EBE5', color: localSel === i ? 'white' : 'var(--brown-light)', border: 'none' }}>
                  {l}
                </button>
              ))}
            </div>

            <div style={{ fontWeight: 600, color: 'var(--brown)', fontSize: 14, marginBottom: 8 }}>Dose aplicada</div>
            <input
              type="text"
              value={doseInput}
              onChange={e => setDoseInput(e.target.value)}
              placeholder={dosePerfil || 'Ex: 5mg, 2,5mg'}
              style={{ width: '100%', padding: '12px 14px', borderRadius: 12, border: '1.5px solid rgba(45,31,20,0.2)', fontSize: 15, color: 'var(--brown)', background: 'white', boxSizing: 'border-box', marginBottom: 20 }}
            />

            <button className="btn-primary" onClick={registrar} style={{ marginBottom: 10 }}>Confirmar aplicação ✅</button>
            <button onClick={() => setShowModal(false)} style={{ width: '100%', padding: '14px', borderRadius: 14, border: 'none', background: 'transparent', color: '#9A8070', fontSize: 15, cursor: 'pointer' }}>Cancelar</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── TELA: DIÁRIO ───────────────────────────────────────── */
function DiarioScreen() {
  const hoje = new Date();
  const dataISO = hoje.toISOString().split('T')[0];
  const mesesPT = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  const dataStr = `${hoje.getDate()} de ${mesesPT[hoje.getMonth()]}`;

  // Carrega todas as entradas do localStorage
  const [entradas, setEntradas] = useState(() => {
    try { return JSON.parse(localStorage.getItem('renove_diario') || '{}'); } catch { return {}; }
  });

  const entradaHoje = entradas[dataISO] || null;

  const [sintomas, setSintomas] = useState(entradaHoje?.sintomas || {
    nausea: 0, vomito: 0, constipacao: 0, dor: 0, tontura: 0, local: 0,
  });
  const [hydra, setHydra] = useState(entradaHoje?.hydra || 1.5);
  const [saved, setSaved] = useState(!!entradaHoje);

  // Calcula sequência real de dias consecutivos
  const calcStreak = (entradasObj) => {
    let streak = 0;
    const d = new Date();
    for (let i = 0; i < 365; i++) {
      const iso = d.toISOString().split('T')[0];
      if (!entradasObj[iso]) break;
      streak++;
      d.setDate(d.getDate() - 1);
    }
    return streak;
  };

  const salvar = () => {
    const novas = { ...entradas, [dataISO]: { sintomas, hydra, salvoEm: new Date().toISOString() } };
    setEntradas(novas);
    localStorage.setItem('renove_diario', JSON.stringify(novas));
    setSaved(true);
  };

  const streak = calcStreak(saved ? { ...entradas, [dataISO]: true } : entradas);

  const niveis = ['Nenhum', 'Leve', 'Moderado', 'Intenso'];
  const listaSintomas = [
    { key: 'nausea', label: 'Náusea', emoji: '🤢' },
    { key: 'vomito', label: 'Vômito', emoji: '🤮' },
    { key: 'constipacao', label: 'Constipação', emoji: '😣' },
    { key: 'dor', label: 'Dor abdominal', emoji: '😖' },
    { key: 'tontura', label: 'Tontura', emoji: '😵' },
    { key: 'local', label: 'Reação no local', emoji: '💢' },
  ];

  const maxSintoma = Math.max(...Object.values(sintomas));
  const semaforo = maxSintoma <= 1 ? 'verde' : maxSintoma === 2 ? 'amarelo' : 'vermelho';
  const msgSemaforo = {
    verde: { cor: '#2E7D52', bg: '#EBF7F1', txt: 'Tudo certo! Continue hidratando bem e priorizando proteína.', dot: '#4CAF7A' },
    amarelo: { cor: '#8A5E00', bg: '#FFF8E0', txt: 'Cuide-se! Coma devagar, em pequenas porções e descanse quando precisar.', dot: '#D4A017' },
    vermelho: { cor: '#B71C1C', bg: '#FDECEA', txt: 'Sintomas intensos — considere falar com seu médico.', dot: '#D94F4F' },
  };
  const s = msgSemaforo[semaforo];

  // Entradas recentes para o mini histórico
  const entradasRecentes = Object.entries(entradas)
    .sort((a, b) => b[0] > a[0] ? 1 : -1)
    .slice(0, 5);

  return (
    <div className="screen">
      <div className="header-grad px-5 pt-12 pb-6">
        <div className="flex items-center justify-between">
          <div>
            <h2 style={{ color: 'var(--cream)', fontSize: 22, fontWeight: 800, margin: 0, marginBottom: 4, letterSpacing: '-0.3px' }}>Diário de Sintomas</h2>
            <p style={{ color: 'rgba(245,237,227,0.6)', fontSize: 13, margin: 0 }}>Hoje, {dataStr}</p>
          </div>
          {streak > 0 && (
            <div style={{ textAlign: 'center', background: 'rgba(255,255,255,0.08)', borderRadius: 14, padding: '8px 14px', border: '1px solid rgba(220,170,120,0.2)' }}>
              <Icon name="flame" size={20} color="var(--copper-light)" strokeWidth={0} />
              <div style={{ color: 'var(--copper-light)', fontWeight: 800, fontSize: 17, lineHeight: 1.1 }}>{streak}</div>
              <div style={{ color: 'rgba(245,237,227,0.5)', fontSize: 10, letterSpacing: '0.3px' }}>dias</div>
            </div>
          )}
        </div>
      </div>

      <div className="px-4 py-4 flex flex-col gap-4">
        {/* Semáforo */}
        <div style={{ background: s.bg, borderRadius: 16, padding: '14px 16px', border: `1.5px solid ${s.dot}30` }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            <div style={{ width: 44, height: 44, borderRadius: 14, background: `${s.dot}18`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, border: `1.5px solid ${s.dot}30` }}>
              <div className="status-dot" style={{ background: s.dot, boxShadow: `0 0 8px ${s.dot}60` }} />
            </div>
            <div>
              <div style={{ fontWeight: 700, color: s.cor, fontSize: 13, letterSpacing: '0.1px' }}>Status de hoje</div>
              <div style={{ fontSize: 13, color: s.cor, opacity: 0.8, marginTop: 2, lineHeight: 1.4 }}>{s.txt}</div>
            </div>
          </div>
        </div>

        {/* Sintomas */}
        <div className="card">
          <div style={{ fontWeight: 700, color: 'var(--brown)', fontSize: 15, marginBottom: 14 }}>Como você está?</div>
          <div className="flex flex-col gap-4">
            {listaSintomas.map(({ key, label }) => (
              <div key={key}>
                <div className="flex items-center gap-2 mb-2">
                  <div style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--copper)', flexShrink: 0 }} />
                  <span style={{ fontSize: 14, fontWeight: 600, color: 'var(--brown)' }}>{label}</span>
                </div>
                <div style={{ display: 'flex', gap: 5 }}>
                  {niveis.map((n, i) => {
                    const sel = sintomas[key] === i;
                    const cls = sel
                      ? (i === 0 ? 'sev-btn none-sel' : i === 1 ? 'sev-btn leve-sel' : i === 2 ? 'sev-btn mod-sel' : 'sev-btn intense-sel')
                      : 'sev-btn unsel';
                    return (
                      <button key={n} onClick={() => setSintomas(prev => ({ ...prev, [key]: i }))}
                        className={cls}>{n}</button>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Hidratação */}
        <div className="card">
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
            <Icon name="droplets" size={18} color="var(--copper)" strokeWidth={2} />
            <span style={{ fontWeight: 700, color: 'var(--brown)', fontSize: 15 }}>Hidratação hoje</span>
          </div>
          <div className="flex items-center gap-4">
            <button onClick={() => setHydra(h => Math.max(0, +(h - 0.25).toFixed(2)))}
              style={{ width: 40, height: 40, borderRadius: '50%', background: '#F5F0EC', border: 'none', fontSize: 20, cursor: 'pointer', fontWeight: 700, color: 'var(--brown-light)' }}>−</button>
            <div style={{ flex: 1, textAlign: 'center' }}>
              <div style={{ fontSize: 32, fontWeight: 800, color: hydra >= 2 ? 'var(--green)' : 'var(--copper)' }}>{hydra.toFixed(1)}L</div>
              <div style={{ fontSize: 12, color: '#9A8070' }}>Meta: 2,5L</div>
              <div style={{ height: 6, background: '#EEE8E0', borderRadius: 3, marginTop: 8 }}>
                <div style={{ height: '100%', background: hydra >= 2 ? 'var(--green)' : 'var(--copper)', borderRadius: 3, width: `${Math.min(100, (hydra/2.5)*100)}%`, transition: 'width .3s' }} />
              </div>
            </div>
            <button onClick={() => setHydra(h => +(h + 0.25).toFixed(2))}
              style={{ width: 40, height: 40, borderRadius: '50%', background: 'var(--copper)', border: 'none', fontSize: 20, cursor: 'pointer', fontWeight: 700, color: 'white' }}>+</button>
          </div>
        </div>

        {!saved ? (
          <button className="btn-primary" onClick={salvar} style={{ fontSize: 16, padding: 16 }}>
            💾 Salvar registro de hoje
          </button>
        ) : (
          <div style={{ background: '#E8F8EE', border: '1.5px solid var(--green)', borderRadius: 14, padding: 16, textAlign: 'center' }}>
            <div style={{ fontSize: 28, marginBottom: 4 }}>✅</div>
            <div style={{ fontWeight: 700, color: '#2E7D52', fontSize: 15 }}>
              Registro salvo!{streak > 1 ? ` Sequência: 🔥 ${streak} dias` : ' Primeiro dia registrado 🌱'}
            </div>
            <button onClick={() => setSaved(false)} style={{ background: 'none', border: 'none', color: '#4CAF7A', fontSize: 12, cursor: 'pointer', marginTop: 6, fontWeight: 600 }}>
              Editar registro →
            </button>
          </div>
        )}

        {/* Mini histórico */}
        {entradasRecentes.length > 1 && (
          <div>
            <div style={{ fontWeight: 700, color: 'var(--brown)', fontSize: 15, marginBottom: 10 }}>Registros anteriores</div>
            {entradasRecentes.map(([iso, entrada]) => {
              if (iso === dataISO) return null;
              const d = new Date(iso + 'T00:00:00');
              const dataFormatada = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
              const max = Math.max(...Object.values(entrada.sintomas || {}));
              const cor = max <= 1 ? 'var(--green)' : max === 2 ? 'var(--yellow)' : 'var(--red)';
              const emoji = max <= 1 ? '🟢' : max === 2 ? '🟡' : '🔴';
              return (
                <div key={iso} style={{ background: 'white', borderRadius: 12, padding: '12px 14px', marginBottom: 6, display: 'flex', justifyContent: 'space-between', alignItems: 'center', boxShadow: '0 1px 6px rgba(45,31,20,0.05)' }}>
                  <div style={{ fontWeight: 600, color: 'var(--brown)', fontSize: 14 }}>{dataFormatada}</div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <span style={{ fontSize: 16 }}>{emoji}</span>
                    <span style={{ fontSize: 12, color: '#9A8070' }}>💧 {(entrada.hydra || 0).toFixed(1)}L</span>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── TELA: PESO ─────────────────────────────────────────── */
function PesoScreen({ perfil }) {
  const [aba, setAba] = useState('peso');

  // ── Peso ──
  const meta = parseFloat(perfil?.meta) || 85;
  const pesoInicialPerfil = parseFloat(perfil?.pesoInicio) || 112.4;
  const dataInicioPerfil = perfil?.dataInicio || '2025-02-01';

  const fmtData = (isoStr) => {
    const d = new Date(isoStr + 'T00:00:00');
    return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
  };

  const [pesos, setPesos] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('renove_pesos') || 'null');
      if (saved && saved.length > 0) return saved;
    } catch {}
    const entries = [{ data: fmtData(dataInicioPerfil), peso: pesoInicialPerfil, dataISO: dataInicioPerfil }];
    const pesoAtualPerfil = parseFloat(perfil?.pesoAtual);
    if (pesoAtualPerfil && pesoAtualPerfil !== pesoInicialPerfil) {
      const hoje = new Date().toISOString().split('T')[0];
      if (hoje !== dataInicioPerfil) entries.push({ data: fmtData(hoje), peso: pesoAtualPerfil, dataISO: hoje });
    }
    return entries;
  });

  const [novoPeso, setNovoPeso] = useState('');
  const [periodo, setPeriodo] = useState('all');
  const [adicionado, setAdicionado] = useState(false);

  const salvarPesos = (arr) => { setPesos(arr); localStorage.setItem('renove_pesos', JSON.stringify(arr)); };

  const nPts = { '14': 3, '30': 6, 'all': pesos.length };
  const dadosFiltrados = pesos.slice(-nPts[periodo]);
  const pesoAtual = pesos[pesos.length - 1].peso;
  const pesoInicio = pesos[0].peso;
  const perdido = Math.max(0, pesoInicio - pesoAtual).toFixed(1);
  const kgPerdidos = parseFloat(perdido);
  const progresso = Math.max(0, Math.min(100, ((pesoInicio - pesoAtual) / (pesoInicio - meta) * 100))).toFixed(0);
  const faltaMeta = Math.max(0, pesoAtual - meta).toFixed(1);
  const estimGordura = (kgPerdidos * 0.72).toFixed(1);
  const estimMuscular = (kgPerdidos * 0.28).toFixed(1);

  const adicionar = () => {
    const p = parseFloat(novoPeso.replace(',', '.'));
    if (!p || p < 30 || p > 300) return;
    const hoje = new Date();
    const dataISO = hoje.toISOString().split('T')[0];
    const filtrado = pesos.filter(x => x.dataISO !== dataISO);
    salvarPesos([...filtrado, { data: fmtData(dataISO), peso: p, dataISO }].sort((a, b) => a.dataISO > b.dataISO ? 1 : -1));
    setNovoPeso(''); setAdicionado(true); setTimeout(() => setAdicionado(false), 2500);
  };

  // ── Medidas ──
  const [medidas, setMedidas] = useState(() => {
    try { return JSON.parse(localStorage.getItem('renove_medidas') || '[]'); } catch { return []; }
  });
  const [novaMedida, setNovaMedida] = useState({ cintura: '', quadril: '', braco: '', coxa: '' });
  const [medidaSalva, setMedidaSalva] = useState(false);

  const salvarMedida = () => {
    const c = parseFloat(novaMedida.cintura.replace(',','.')), q = parseFloat(novaMedida.quadril.replace(',','.'));
    const b = parseFloat(novaMedida.braco.replace(',','.')), t = parseFloat(novaMedida.coxa.replace(',','.'));
    if (!c && !q && !b && !t) return;
    const dataISO = new Date().toISOString().split('T')[0];
    const novas = [...medidas.filter(m => m.dataISO !== dataISO),
      { dataISO, data: fmtData(dataISO), cintura: c||null, quadril: q||null, braco: b||null, coxa: t||null }
    ].sort((a, b) => a.dataISO > b.dataISO ? 1 : -1);
    setMedidas(novas); localStorage.setItem('renove_medidas', JSON.stringify(novas));
    setNovaMedida({ cintura: '', quadril: '', braco: '', coxa: '' });
    setMedidaSalva(true); setTimeout(() => setMedidaSalva(false), 2500);
  };

  const primeiraM = medidas[0], ultimaM = medidas[medidas.length - 1];
  const deltaCintura = primeiraM?.cintura && ultimaM?.cintura ? (primeiraM.cintura - ultimaM.cintura).toFixed(1) : null;
  const deltaQuadril = primeiraM?.quadril && ultimaM?.quadril ? (primeiraM.quadril - ultimaM.quadril).toFixed(1) : null;

  let composSinal = 'neutro';
  if (deltaCintura !== null && kgPerdidos > 2) {
    const ratio = parseFloat(deltaCintura) / kgPerdidos;
    composSinal = ratio >= 1.5 ? 'otimo' : ratio >= 0.8 ? 'bom' : 'atencao';
  }
  const composCfg = {
    otimo:   { emoji:'🟢', cor:'#2E7D52', bg:'#E8F8EE',      txt:'Excelente! Você está perdendo principalmente gordura.' },
    bom:     { emoji:'🟡', cor:'#C47A00', bg:'#FFF8E0',      txt:'Boa proporção. Continue priorizando proteína e musculação.' },
    atencao: { emoji:'🔴', cor:'#C0392B', bg:'#FDECEA',      txt:'Atenção à massa magra. Consulte seu médico e aumente proteína.' },
    neutro:  { emoji:'📏', cor:'var(--brown)', bg:'var(--copper-pale)', txt:'Registre medidas para análise de composição corporal.' },
  };

  return (
    <div className="screen">
      <div className="header-grad px-5 pt-12 pb-4">
        <h2 style={{ color: 'var(--cream)', fontSize: 22, fontWeight: 800, margin: 0, marginBottom: 12, letterSpacing: '-0.3px' }}>Corpo & Composição</h2>
        <div style={{ display: 'flex', gap: 6, background: 'rgba(0,0,0,0.18)', borderRadius: 12, padding: 4 }}>
          {[['peso','⚖️ Peso'],['medidas','📏 Medidas']].map(([id, lbl]) => (
            <button key={id} onClick={() => setAba(id)}
              style={{ flex: 1, padding: '9px 0', borderRadius: 9, border: 'none', cursor: 'pointer', fontSize: 14, fontWeight: 600, transition: 'all .2s',
                background: aba === id ? 'var(--copper)' : 'transparent',
                color: aba === id ? 'white' : 'rgba(245,237,227,0.6)' }}>{lbl}</button>
          ))}
        </div>
      </div>

      {aba === 'peso' ? (
        <div className="px-4 py-4 flex flex-col gap-4">
          {/* Stats */}
          <div className="flex gap-3">
            {[
              { label: 'Peso atual',   valor: `${pesoAtual}kg`,                              cor: 'var(--brown)' },
              { label: 'Perdidos',     valor: kgPerdidos > 0 ? `↓ ${perdido}kg` : '—',      cor: 'var(--green)' },
              { label: 'Falta p/ meta', valor: `${faltaMeta}kg`,                             cor: 'var(--copper)' },
            ].map(s => (
              <div key={s.label} className="card" style={{ flex: 1, textAlign: 'center', padding: '12px 8px' }}>
                <div style={{ fontWeight: 800, fontSize: 17, color: s.cor }}>{s.valor}</div>
                <div style={{ fontSize: 11, color: '#9A8070', marginTop: 2 }}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* Composição estimada */}
          {kgPerdidos >= 1 && (
            <div className="card" style={{ background: composSinal !== 'neutro' ? composCfg[composSinal].bg : undefined }}>
              <div style={{ fontWeight: 700, color: 'var(--brown)', fontSize: 15, marginBottom: 10 }}>Composição estimada</div>
              <div style={{ display: 'flex', gap: 10, marginBottom: 10 }}>
                <div style={{ flex: 1, background: 'rgba(196,136,90,0.1)', borderRadius: 12, padding: '12px', textAlign: 'center' }}>
                  <div style={{ fontSize: 24, fontWeight: 800, color: 'var(--copper)' }}>{estimGordura}kg</div>
                  <div style={{ fontSize: 11, color: '#8A7060', marginTop: 2 }}>🔥 Gordura perdida</div>
                </div>
                <div style={{ flex: 1, background: 'rgba(78,160,120,0.1)', borderRadius: 12, padding: '12px', textAlign: 'center' }}>
                  <div style={{ fontSize: 24, fontWeight: 800, color: '#2E7D52' }}>{estimMuscular}kg</div>
                  <div style={{ fontSize: 11, color: '#8A7060', marginTop: 2 }}>💪 Massa magra*</div>
                </div>
              </div>
              {composSinal !== 'neutro' && (
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 12px', background: 'rgba(255,255,255,0.5)', borderRadius: 10 }}>
                  <span style={{ fontSize: 18 }}>{composCfg[composSinal].emoji}</span>
                  <span style={{ fontSize: 13, color: composCfg[composSinal].cor, fontWeight: 600 }}>{composCfg[composSinal].txt}</span>
                </div>
              )}
              <div style={{ fontSize: 10, color: '#9A8070', marginTop: 8, lineHeight: 1.5 }}>
                *Estimativa baseada em dados clínicos de GLP-1 (72% gordura / 28% massa magra). Registre medidas corporais na aba Medidas para análise mais precisa.
              </div>
            </div>
          )}

          {/* Progresso meta */}
          <div className="card">
            <div className="flex justify-between items-center mb-2">
              <span style={{ fontWeight: 600, fontSize: 14, color: 'var(--brown)' }}>Progresso até {meta}kg</span>
              <span style={{ fontWeight: 700, fontSize: 16, color: 'var(--copper)' }}>{progresso}%</span>
            </div>
            <div style={{ height: 10, background: '#EEE8E0', borderRadius: 5 }}>
              <div style={{ height: '100%', background: 'linear-gradient(90deg, var(--copper), var(--copper-light))', borderRadius: 5, width: `${progresso}%`, transition: 'width .5s' }} />

              <span>Início: {pesoInicio}kg</span><span>Meta: {meta}kg</span>

          </div>

          {/* Registrar peso */}
          <div className="card">
            <div style={{ fontWeight: 700, color: 'var(--brown)', fontSize: 15, marginBottom: 12 }}>Registrar novo peso</div>
            {adicionado ? (
              <div style={{ background: '#E8F8EE', border: '1.5px solid var(--green)', borderRadius: 10, padding: '12px 16px', textAlign: 'center', color: '#2E7D52', fontWeight: 700 }}>✅ Peso registrado!</div>
            ) : (
              <div className="flex gap-2">

                  style={{ flex: 1, padding: '12px 14px', borderRadius: 10, border: '1.5px solid #E0D8D0', fontSize: 15, color: 'var(--brown)' }} />
                <button onClick={adicionar} className="btn-primary" style={{ width: 'auto', padding: '12px 20px', fontSize: 15 }}>+ Salvar</button>
              </div>

          </div>

          {/* Gráfico */}
          {pesos.length >= 2 && (
            <div className="card">
              <div className="flex justify-between items-center mb-3">
                <span style={{ fontWeight: 700, color: 'var(--brown)', fontSize: 15 }}>Gráfico</span>
                <div className="flex gap-1">
                  {[['14','14d'],['30','30d'],['all','Tudo']].map(([v,l]) => (
                    <button key={v} onClick={() => setPeriodo(v)}

          </div>
        </div>
      ) : (
        /* ── ABA MEDIDAS ── */
        <div className="px-4 py-4 flex flex-col gap-4">

              <>

                  {[

              ['Coxa','Na parte mais larga da coxa direita'],

              <div key={local} style={{ marginBottom: 6 }}>

                  <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>

          )}
        </div>
      )}
    </div>
  );
}

/* ─── TELA: CALCULADORA ──────────────────────────────────── */
function CalculadoraScreen() {
  const [form, setForm] = useState({ sexo: 'F', idade: 34, altura: 165, peso: 98.9, cintura: 96, quadril: 112, pescoco: 36 });
  const [result, setResult] = useState(null);

  const calcular = () => {
    const { sexo, altura, cintura, quadril, pescoco, peso, idade } = form;
    let gordura;
    if (sexo === 'F') {
      gordura = 495 / (1.29579 - 0.35004 * Math.log10(cintura + quadril - pescoco) + 0.22100 * Math.log10(altura)) - 450;
    } else {
      gordura = 495 / (1.0324 - 0.19077 * Math.log10(cintura - pescoco) + 0.15456 * Math.log10(altura)) - 450;
    }
    gordura = Math.max(5, Math.min(60, gordura));
    const massaGorda = (gordura / 100) * peso;
    const massaMagra = peso - massaGorda;
    const imc = peso / ((altura / 100) ** 2);
    const rcq = cintura / quadril;
    setResult({ gordura: gordura.toFixed(1), massaGorda: massaGorda.toFixed(1), massaMagra: massaMagra.toFixed(1), imc: imc.toFixed(1), rcq: rcq.toFixed(2) });
  };

  const f = (key) => ({ value: form[key], onChange: e => setForm(p => ({ ...p, [key]: parseFloat(e.target.value) || e.target.value }) )});
  const inputStyle = { width: '100%', padding: '11px 14px', borderRadius: 10, border: '1.5px solid #E0D8D0', fontSize: 14, color: 'var(--brown)' };

  const imcLabel = result ? (result.imc < 18.5 ? 'Abaixo do peso' : result.imc < 25 ? 'Normal' : result.imc < 30 ? 'Sobrepeso' : 'Obesidade') : '';
  const imcCor = result ? (result.imc < 25 ? 'var(--green)' : result.imc < 30 ? 'var(--yellow)' : 'var(--red)') : '';

  return (

/* ─── TELA: RÊ (chat) ────────────────────────────────────── */
function ReScreen({ perfil }) {
  const [msgs, setMsgs] = useState(MSGS_INICIAIS);
  const [historico, setHistorico] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [msgs]);

  const enviar = async (textoOverride) => {
    const txt = (textoOverride || input).trim();
    if (!txt || loading) return;

    const novaMsg = { de: 'user', texto: txt };
    setMsgs(m => [...m, novaMsg]);
    setInput('');
    setLoading(true);

    const novoHistorico = [...historico, { role: 'user', content: txt }];
    setHistorico(novoHistorico);

    try {
      // Se tiver chave local (dev), chama OpenAI direto.
      // Em produção (Vercel), usa o proxy seguro /api/chat.
      const payload = {
        model: 'gpt-4o-mini',
        messages: [
          { role: 'system', content: buildSistemaRe(perfil) },
          ...novoHistorico,
        ],
        max_tokens: 500,
        temperature: 0.5,
      };

      const res = OPENAI_KEY
        ? await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${OPENAI_KEY}` },
            body: JSON.stringify(payload),
          })
        : await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });

      const data = await res.json();

      if (!res.ok) {
        // API retornou erro HTTP (401, 429, 500, etc.)
        const erroMsg = data?.error?.message || `Erro ${res.status}`;
        setMsgs(m => [...m, { de: 'rê', texto: `⚠️ Erro da API: ${erroMsg}` }]);
        setHistorico(h => [...h, { role: 'assistant', content: erroMsg }]);
        setLoading(false);
        return;
      }

      const resposta = data.choices?.[0]?.message?.content || 'Desculpe, tive um problema para responder. Tente novamente!';
      setMsgs(m => [...m, { de: 'rê', texto: resposta }]);
      setHistorico(h => [...h, { role: 'assistant', content: resposta }]);
    } catch (e) {
      setMsgs(m => [...m, { de: 'rê', texto: `⚠️ Erro de conexão: ${e.message}` }]);
    }

    setLoading(false);
  };

  const sugestoes = [
    { emoji: '💉', texto: 'Como aplicar com seringa de insulina?' },
    { emoji: '⏰', texto: 'Esqueci de aplicar, e agora?' },
    { emoji: '🤢', texto: 'Estou com enjoo, o que fazer?' },
    { emoji: '📍', texto: 'Onde posso aplicar e como rotacionar?' },
    { emoji: '🥩', texto: 'Quanta proteína preciso comer?' },
    { emoji: '⚖️', texto: 'Por que meu peso parou de cair?' },
  ];

  return (
    <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column' }}>
      {/* Header */}
      <div className="header-grad px-5 pt-12 pb-5" style={{ flexShrink: 0 }}>
        <div className="flex items-center gap-3">
          <div style={{ width: 44, height: 44, borderRadius: '50%', background: 'rgba(196,136,90,0.2)', border: '2px solid var(--copper)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22 }}>🌿</div>
          <div>
            <div style={{ color: 'var(--cream)', fontWeight: 700, fontSize: 17 }}>Rê</div>
            <div style={{ color: 'var(--green)', fontSize: 12, fontWeight: 500 }}>● Online</div>
          </div>
        </div>
      </div>

      {/* Mensagens */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '16px 16px 0', background: 'var(--cream-light)' }}>
        {msgs.map((m, i) => (
          <div key={i} style={{ display: 'flex', justifyContent: m.de === 'user' ? 'flex-end' : 'flex-start', marginBottom: 12 }}>
            {m.de === 'rê' && (
              <div style={{ width: 32, height: 32, borderRadius: '50%', background: 'var(--copper-pale)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16, marginRight: 8, flexShrink: 0, alignSelf: 'flex-end' }}>🌿</div>
            )}
            <div className={m.de === 'user' ? 'chat-bubble-user' : 'chat-bubble-rê'}
              style={{ maxWidth: '78%', padding: '10px 14px', fontSize: 14, lineHeight: 1.5, color: m.de === 'user' ? 'white' : 'var(--brown)', whiteSpace: 'pre-wrap' }}>
              {m.texto}
            </div>
          </div>
        ))}
        {loading && (
          <div style={{ display: 'flex', marginBottom: 12 }}>
            <div style={{ width: 32, height: 32, borderRadius: '50%', background: 'var(--copper-pale)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16, marginRight: 8 }}>🌿</div>
            <div className="chat-bubble-rê" style={{ padding: '14px 18px' }}>
              <div className="flex gap-1">
                {[0,1,2].map(i => <div key={i} className="pulse" style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--copper)', animationDelay: `${i*0.2}s` }} />)}
              </div>
            </div>
          </div>
        )}
        {msgs.length === 1 && (
          <div style={{ marginTop: 8 }}>
            <div style={{ fontSize: 11, color: '#9A8070', textAlign: 'center', marginBottom: 10, fontWeight: 600, letterSpacing: '0.5px', textTransform: 'uppercase' }}>Perguntas frequentes</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 16 }}>
              {sugestoes.map(s => (
                <button key={s.texto} onClick={() => enviar(s.texto)}
                  style={{ background: 'white', border: '1.5px solid var(--copper-pale)', borderRadius: 16, padding: '10px 12px', fontSize: 12, color: 'var(--brown-light)', cursor: 'pointer', textAlign: 'left', boxShadow: '0 1px 4px rgba(45,31,20,0.06)', lineHeight: 1.35, fontWeight: 500, display: 'flex', flexDirection: 'column', gap: 3 }}>
                  <span style={{ fontSize: 16 }}>{s.emoji}</span>
                  <span>{s.texto}</span>
                </button>
              ))}
            </div>
          </div>
        )}
        <div ref={endRef} />
      </div>

      {/* Input */}
      <div style={{ padding: '10px 12px', background: 'white', borderTop: '1px solid #EEE8E0', paddingBottom: 'calc(10px + 72px)', display: 'flex', gap: 8, alignItems: 'flex-end' }}>
        <textarea
          ref={inputRef}
          value={input} onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey && !loading) { e.preventDefault(); enviar(); } }}
          placeholder="Pergunte à Rê..."
          rows={1}
          style={{ flex: 1, padding: '12px 14px', borderRadius: 18, border: '1.5px solid #E0D8D0', fontSize: 14, color: 'var(--brown)', background: 'var(--cream-light)', resize: 'none', fontFamily: 'Inter, sans-serif', lineHeight: 1.4, maxHeight: 100, overflowY: 'auto', outline: 'none' }}
        />
        <button onClick={() => enviar()}
          style={{ width: 44, height: 44, borderRadius: '50%', background: input.trim() ? 'linear-gradient(135deg, #C98B5E, #A86535)' : '#E0D8D0', border: 'none', fontSize: 18, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, transition: 'background .2s', boxShadow: input.trim() ? '0 3px 12px rgba(168,101,53,0.4)' : 'none' }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={input.trim() ? 'white' : '#9A8070'} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  );
}

}

function NotificacoesScreen({ perfil }) {
  const [permissao, setPermissao] = useState(() => {
    if (!('Notification' in window)) return 'unsupported';
    return Notification.permission;
  });

  const defaultConfig = { aplicacao: true, horarioAplicacao: '09:00', peso: false, horarioPeso: '08:00', diario: false, horarioDiario: '21:00' };
  const [config, setConfig] = useState(() => {
    try {
      const saved = localStorage.getItem('renove_notif');
      return saved ? { ...defaultConfig, ...JSON.parse(saved) } : defaultConfig;
    } catch { return defaultConfig; }
  });

  const salvarConfig = (nova) => {
    setConfig(nova);
    localStorage.setItem('renove_notif', JSON.stringify(nova));
  };
  const toggle = (key) => salvarConfig({ ...config, [key]: !config[key] });

  const pedirPermissao = async () => {
    if (!('Notification' in window)) return;
    const result = await Notification.requestPermission();
    setPermissao(result);
    if (result === 'granted') {
      new Notification('Renove GLP-1 🌿', {
        body: 'Notificações ativadas! Vou te lembrar das aplicações 💉',

  const testarNotificacao = () => {

function NumberStepper({ value, onChange, min = 40, max = 300, step = 0.5, unit = 'kg' }) {
  const dec = () => onChange(Math.max(min, parseFloat((+value - step).toFixed(1))));
  const inc = () => onChange(Math.min(max, parseFloat((+value + step).toFixed(1))));
  const btnStyle = { width: 64, height: 64, borderRadius: '50%', border: '2px solid var(--copper-pale)', background: 'white', fontSize: 30, fontWeight: 300, cursor: 'pointer', color: 'var(--brown)', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 2px 14px rgba(196,136,90,0.18)', flexShrink: 0, lineHeight: 1 };
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 24, padding: '12px 0', width: '100%' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 28 }}>
        <button onClick={dec} style={btnStyle}>−</button>
        <div style={{ textAlign: 'center', minWidth: 130 }}>
          <div style={{ fontSize: 72, fontWeight: 800, color: 'var(--brown)', lineHeight: 1, letterSpacing: '-2px' }}>{value}</div>
          <div style={{ fontSize: 20, color: 'var(--copper)', fontWeight: 700, marginTop: 6 }}>{unit}</div>
        </div>
        <button onClick={inc} style={btnStyle}>+</button>
      </div>
      <input type="range" min={min} max={max} step={step} value={value}
        onChange={e => onChange(parseFloat(e.target.value))}
        style={{ width: '76%', accentColor: 'var(--copper)', height: 4 }} />
    </div>
  );
}

  const toggleObj = id => setDados(p => ({
    ...p, objetivos: p.objetivos.includes(id) ? p.objetivos.filter(o => o !== id) : [...p.objetivos, id],
  }));

  // Meds que usam frasco/ampola manipulada (mostrar step de concentração)
  const medsComAmpola = ['tg','lipoless','tirzec','lipoland','gluconex','tirzepatida-generica','semaglutida-generica','outro'];
