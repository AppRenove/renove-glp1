/* ─── SVG CHART ──────────────────────────────────────────── */
function WeightChart({ dados, meta }) {
  const W = 340, H = 160, PAD = { top: 20, right: 20, bottom: 30, left: 40 };
  const chartW = W - PAD.left - PAD.right;
  const chartH = H - PAD.top - PAD.bottom;
  const minP = Math.min(...dados.map(d => d.peso)) - 1;
  const maxP = Math.max(...dados.map(d => d.peso)) + 1;
  const scaleX = i => PAD.left + (i / (dados.length - 1)) * chartW;
  const scaleY = v => PAD.top + (1 - (v - minP) / (maxP - minP)) * chartH;
  const pts = dados.map((d, i) => `${scaleX(i)},${scaleY(d.peso)}`).join(' ');
  const area = `M ${scaleX(0)},${scaleY(dados[0].peso)} ` +
    dados.slice(1).map((d, i) => `L ${scaleX(i+1)},${scaleY(d.peso)}`).join(' ') +
    ` L ${scaleX(dados.length-1)},${PAD.top + chartH} L ${PAD.left},${PAD.top + chartH} Z`;

  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ overflow: 'visible' }}>
      <defs>
        <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#C4885A" stopOpacity="0.25" />
          <stop offset="100%" stopColor="#C4885A" stopOpacity="0.02" />
        </linearGradient>
      </defs>
      {/* Grid lines */}
      {[0,0.25,0.5,0.75,1].map(t => (
        <line key={t} x1={PAD.left} y1={PAD.top + t * chartH} x2={W - PAD.right} y2={PAD.top + t * chartH}
          stroke="#E8E0D8" strokeWidth="1" />
      ))}
      {/* Area */}
      <path d={area} fill="url(#chartGrad)" />
      {/* Line */}
      <polyline points={pts} fill="none" stroke="#C4885A" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
      {/* Dots */}
      {dados.map((d, i) => (
        <circle key={i} cx={scaleX(i)} cy={scaleY(d.peso)} r={i === dados.length - 1 ? 5 : 3}
          fill={i === dados.length - 1 ? '#C4885A' : 'white'} stroke="#C4885A" strokeWidth="2" />
      ))}
      {/* Labels X — mostrar só início, meio e fim */}
      {[0, Math.floor(dados.length/2), dados.length-1].map(i => (
        <text key={i} x={scaleX(i)} y={H - 4} textAnchor="middle" fontSize="9" fill="#9A8070">{dados[i].data}</text>
      ))}
      {/* Labels Y */}
      {[minP+1, (minP+maxP)/2, maxP-1].map((v, i) => (
        <text key={i} x={PAD.left - 6} y={scaleY(v) + 4} textAnchor="end" fontSize="9" fill="#9A8070">{Math.round(v)}</text>
      ))}
    </svg>
  );
}

/* ─── TELA: PESO ─────────────────────────────────────────── */
function PesoScreen() {
  const [pesos, setPesos] = useState(MOCK_PESOS);
  const [novoPeso, setNovoPeso] = useState('');
  const [periodo, setPeriodo] = useState('all');

  const dadosFiltrados = periodo === '30' ? pesos.slice(-5) : periodo === '14' ? pesos.slice(-3) : pesos;
  const pesoAtual = pesos[pesos.length - 1].peso;
  const pesoInicio = pesos[0].peso;
  const perdido = (pesoInicio - pesoAtual).toFixed(1);
  const meta = 85;
  const progresso = ((pesoInicio - pesoAtual) / (pesoInicio - meta) * 100).toFixed(0);

  const adicionar = () => {
    const p = parseFloat(novoPeso.replace(',', '.'));
    if (!p || p < 30 || p > 300) return;
    const hoje = new Date();
    const data = `${String(hoje.getDate()).padStart(2,'0')}/${String(hoje.getMonth()+1).padStart(2,'0')}`;
    setPesos(prev => [...prev, { data, peso: p }]);
    setNovoPeso('');
  };

  return (
    <div className="screen">
      <div className="header-grad px-5 pt-12 pb-6">
        <h2 style={{ color: 'var(--cream)', fontSize: 22, fontWeight: 700, margin: 0, marginBottom: 4 }}>Evolução de Peso ⚖️</h2>
        <p style={{ color: 'rgba(245,237,227,0.6)', fontSize: 13, margin: 0 }}>Desde o início do tratamento</p>
      </div>

      <div className="px-4 py-4 flex flex-col gap-4">
        {/* Cards de stats */}
        <div className="flex gap-3">
          {[
            { label: 'Peso atual', valor: `${pesoAtual}kg`, cor: 'var(--brown)' },
            { label: 'Perdidos', valor: `↓ ${perdido}kg`, cor: 'var(--green)' },
            { label: 'Meta', valor: `${meta}kg`, cor: 'var(--copper)' },
          ].map(s => (
            <div key={s.label} className="card" style={{ flex: 1, textAlign: 'center', padding: '12px 8px' }}>
              <div style={{ fontWeight: 800, fontSize: 17, color: s.cor }}>{s.valor}</div>
              <div style={{ fontSize: 11, color: '#9A8070', marginTop: 2 }}>{s.label}</div>
            </div>
          ))}
        </div>

        {/* Progresso meta */}
        <div className="card">
          <div className="flex justify-between items-center mb-2">
            <span style={{ fontWeight: 600, fontSize: 14, color: 'var(--brown)' }}>Progresso até a meta</span>
            <span style={{ fontWeight: 700, fontSize: 16, color: 'var(--copper)' }}>{progresso}%</span>
          </div>
          <div style={{ height: 10, background: '#EEE8E0', borderRadius: 5 }}>
            <div style={{ height: '100%', background: 'linear-gradient(90deg, var(--copper), var(--copper-light))', borderRadius: 5, width: `${progresso}%`, transition: 'width .5s' }} />
          </div>
          <div className="flex justify-between mt-2" style={{ fontSize: 11, color: '#9A8070' }}>
            <span>Início: {pesoInicio}kg</span>
            <span>Meta: {meta}kg</span>
          </div>
        </div>

        {/* Gráfico */}
        <div className="card">
          <div className="flex justify-between items-center mb-3">
            <span style={{ fontWeight: 700, color: 'var(--brown)', fontSize: 15 }}>Gráfico</span>
            <div className="flex gap-1">
              {[['14','14d'],['30','30d'],['all','Tudo']].map(([v,l]) => (
                <button key={v} onClick={() => setPeriodo(v)}
                  style={{ padding: '4px 10px', borderRadius: 8, fontSize: 11, fontWeight: 600, border: 'none', cursor: 'pointer',
                    background: periodo === v ? 'var(--copper)' : '#F5F0EC',
                    color: periodo === v ? 'white' : '#8A7060' }}>{l}</button>

          </div>

        {/* Adicionar peso */}

/* ─── TELA: CALCULADORA ──────────────────────────────────── */
function CalculadoraScreen() {
  const [form, setForm] = useState({ sexo: 'F', idade: 34, altura: 165, peso: 98.9, cintura: 96, quadril: 112, pescoco: 36 });
  const [result, setResult] = useState(null);

  const calcular = () => {
    const { sexo, altura, cintura, quadril, pescoco, peso, idade } = form;
    let gordura;
    if (sexo === 'F') {
      gordura = 495 / (1.29579 - 0.35004 * Math.log10(cintura + quadril - pescoco) + 0.22100 * Math.log10(altura)) - 450;
    } else {
      gordura = 495 / (1.0324 - 0.19077 * Math.log10(cintura - pescoco) + 0.15456 * Math.log10(altura)) - 450;
    }
    gordura = Math.max(5, Math.min(60, gordura));
    const massaGorda = (gordura / 100) * peso;
    const massaMagra = peso - massaGorda;
    const imc = peso / ((altura / 100) ** 2);
    const rcq = cintura / quadril;
    setResult({ gordura: gordura.toFixed(1), massaGorda: massaGorda.toFixed(1), massaMagra: massaMagra.toFixed(1), imc: imc.toFixed(1), rcq: rcq.toFixed(2) });
  };

  const f = (key) => ({ value: form[key], onChange: e => setForm(p => ({ ...p, [key]: parseFloat(e.target.value) || e.target.value }) )});
  const inputStyle = { width: '100%', padding: '11px 14px', borderRadius: 10, border: '1.5px solid #E0D8D0', fontSize: 14, color: 'var(--brown)' };

  const imcLabel = result ? (result.imc < 18.5 ? 'Abaixo do peso' : result.imc < 25 ? 'Normal' : result.imc < 30 ? 'Sobrepeso' : 'Obesidade') : '';
  const imcCor = result ? (result.imc < 25 ? 'var(--green)' : result.imc < 30 ? 'var(--yellow)' : 'var(--red)') : '';

  return (
    <div className="screen">
      <div className="header-grad px-5 pt-12 pb-6">
        <h2 style={{ color: 'var(--cream)', fontSize: 22, fontWeight: 700, margin: 0, marginBottom: 4 }}>Calculadora Corporal 🧮</h2>
        <p style={{ color: 'rgba(245,237,227,0.6)', fontSize: 13, margin: 0 }}>Método da Marinha dos EUA</p>
      </div>

      <div className="px-4 py-4 flex flex-col gap-4">
        <div className="card">
          <div style={{ fontWeight: 700, color: 'var(--brown)', fontSize: 15, marginBottom: 14 }}>Seus dados</div>
          {/* Sexo */}
          <div className="mb-4">
            <label style={{ fontSize: 13, fontWeight: 600, color: '#8A7060', display: 'block', marginBottom: 6 }}>Sexo</label>
            <div className="flex gap-2">
              {['F','M'].map(s => (
                <button key={s} onClick={() => setForm(p => ({ ...p, sexo: s }))}
                  style={{ flex: 1, padding: 10, borderRadius: 10, border: 'none', fontSize: 14, fontWeight: 600, cursor: 'pointer',
                    background: form.sexo === s ? 'var(--copper)' : '#F5F0EC',
                    color: form.sexo === s ? 'white' : 'var(--brown-light)' }}>
                  {s === 'F' ? '👩 Feminino' : '👨 Masculino'}
                </button>
              ))}
            </div>
          </div>
          {/* Campos */}
          {[
            { key: 'idade', label: 'Idade (anos)', placeholder: '34' },
            { key: 'altura', label: 'Altura (cm)', placeholder: '165' },
            { key: 'peso', label: 'Peso atual (kg)', placeholder: '98,9' },
            { key: 'cintura', label: 'Cintura (cm) — altura do umbigo', placeholder: '96' },
            { key: 'quadril', label: 'Quadril (cm) — parte mais larga', placeholder: '112' },
            { key: 'pescoco', label: 'Pescoço (cm) — abaixo da laringe', placeholder: '36' },
          ].map(({ key, label, placeholder }) => (
            <div key={key} className="mb-3">
              <label style={{ fontSize: 13, fontWeight: 600, color: '#8A7060', display: 'block', marginBottom: 6 }}>{label}</label>
              <input type="number" placeholder={placeholder} {...f(key)} style={inputStyle} />
            </div>
          ))}
          <button className="btn-primary" onClick={calcular} style={{ fontSize: 15, padding: 14, marginTop: 4 }}>Calcular composição corporal</button>
        </div>

        {result && (
          <div className="card">
            <div style={{ fontWeight: 700, color: 'var(--brown)', fontSize: 15, marginBottom: 14 }}>Resultado da análise</div>
            {[
              { label: '% de gordura corporal', valor: `${result.gordura}%`, sub: `${result.massaGorda}kg de gordura`, cor: parseFloat(result.gordura) > 30 ? 'var(--red)' : 'var(--copper)' },
              { label: '% de massa magra', valor: `${(100-parseFloat(result.gordura)).toFixed(1)}%`, sub: `${result.massaMagra}kg de massa magra`, cor: 'var(--green)' },
              { label: 'IMC', valor: result.imc, sub: imcLabel, cor: imcCor },
              { label: 'Relação cintura/quadril', valor: result.rcq, sub: result.rcq < 0.85 ? 'Dentro do ideal' : 'Atenção ao risco cardiovascular', cor: result.rcq < 0.85 ? 'var(--green)' : 'var(--yellow)' },
            ].map(r => (

              ⚠️ Estimativa baseada no Método da Marinha dos EUA. Não substitui avaliação com bioimpedância ou DEXA.
            </div>
          </div>
        )}

    </div>
  );
}

/* ─── TELA: RÊ (chat) ────────────────────────────────────── */
function ReScreen() {
  const [msgs, setMsgs] = useState(MSGS_INICIAIS);
  const [historico, setHistorico] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [msgs]);

  const enviar = async () => {
    const txt = input.trim();
    if (!txt || loading) return;

    const novaMsg = { de: 'user', texto: txt };
    setMsgs(m => [...m, novaMsg]);
    setInput('');
    setLoading(true);

    const novoHistorico = [...historico, { role: 'user', content: txt }];
    setHistorico(novoHistorico);

    try {
      // Se tiver chave local (dev), chama OpenAI direto.
      // Em produção (Vercel), usa o proxy seguro /api/chat.
      const payload = {
        model: 'gpt-4o-mini',
        messages: [
          { role: 'system', content: SISTEMA_RE },
          ...novoHistorico,
        ],
        max_tokens: 400,
        temperature: 0.7,
      };

      const res = OPENAI_KEY
        ? await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${OPENAI_KEY}` },
            body: JSON.stringify(payload),
          })
        : await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });

      const data = await res.json();

      if (!res.ok) {
        // API retornou erro HTTP (401, 429, 500, etc.)
        const erroMsg = data?.error?.message || `Erro ${res.status}`;
        setMsgs(m => [...m, { de: 'rê', texto: `⚠️ Erro da API: ${erroMsg}` }]);
        setHistorico(h => [...h, { role: 'assistant', content: erroMsg }]);
        setLoading(false);
        return;
      }

      const resposta = data.choices?.[0]?.message?.content || 'Desculpe, tive um problema para responder. Tente novamente!';
      setMsgs(m => [...m, { de: 'rê', texto: resposta }]);
      setHistorico(h => [...h, { role: 'assistant', content: resposta }]);
    } catch (e) {
      setMsgs(m => [...m, { de: 'rê', texto: `⚠️ Erro de conexão: ${e.message}` }]);
    }

    setLoading(false);
  };

  const sugestoes = ['Como puxar 2,5mg na seringa?', 'Esqueci de aplicar, e agora?', 'Estou com enjoo', 'Onde posso aplicar?'];

  return (
    <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column' }}>
      {/* Header */}
      <div className="header-grad px-5 pt-12 pb-5" style={{ flexShrink: 0 }}>
        <div className="flex items-center gap-3">
          <div style={{ width: 44, height: 44, borderRadius: '50%', background: 'rgba(196,136,90,0.2)', border: '2px solid var(--copper)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22 }}>🌿</div>
          <div>
            <div style={{ color: 'var(--cream)', fontWeight: 700, fontSize: 17 }}>Rê</div>
            <div style={{ color: 'var(--green)', fontSize: 12, fontWeight: 500 }}>● Online</div>
          </div>
        </div>
      </div>

      {/* Mensagens */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '16px 16px 0', background: 'var(--cream-light)' }}>
        {msgs.map((m, i) => (
          <div key={i} style={{ display: 'flex', justifyContent: m.de === 'user' ? 'flex-end' : 'flex-start', marginBottom: 12 }}>
            {m.de === 'rê' && (
              <div style={{ width: 32, height: 32, borderRadius: '50%', background: 'var(--copper-pale)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16, marginRight: 8, flexShrink: 0, alignSelf: 'flex-end' }}>🌿</div>
            )}
            <div className={m.de === 'user' ? 'chat-bubble-user' : 'chat-bubble-rê'}
              style={{ maxWidth: '78%', padding: '10px 14px', fontSize: 14, lineHeight: 1.5, color: m.de === 'user' ? 'white' : 'var(--brown)', whiteSpace: 'pre-wrap' }}>
              {m.texto}
            </div>
          </div>
        ))}
        {loading && (
          <div style={{ display: 'flex', marginBottom: 12 }}>
            <div style={{ width: 32, height: 32, borderRadius: '50%', background: 'var(--copper-pale)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16, marginRight: 8 }}>🌿</div>
            <div className="chat-bubble-rê" style={{ padding: '14px 18px' }}>
              <div className="flex gap-1">
                {[0,1,2].map(i => <div key={i} className="pulse" style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--copper)', animationDelay: `${i*0.2}s` }} />)}
              </div>
            </div>
          </div>
        )}
        {msgs.length === 1 && (
          <div>
            <div style={{ fontSize: 12, color: '#9A8070', textAlign: 'center', marginBottom: 10 }}>Perguntas frequentes</div>
            <div className="flex flex-col gap-2 mb-4">
              {sugestoes.map(s => (
                <button key={s} onClick={() => { setInput(s); }}
                  style={{ background: 'white', border: '1.5px solid var(--copper-pale)', borderRadius: 20, padding: '10px 16px', fontSize: 13, color: 'var(--brown-light)', cursor: 'pointer', textAlign: 'left', boxShadow: '0 1px 4px rgba(45,31,20,0.06)' }}>
                  💬 {s}
                </button>
              ))}
            </div>
          </div>
        )}
        <div ref={endRef} />
      </div>

      {/* Input */}
      <div style={{ padding: '10px 12px', background: 'white', borderTop: '1px solid #EEE8E0', paddingBottom: 'calc(10px + 72px)', display: 'flex', gap: 8, alignItems: 'flex-end' }}>
        <input
          value={input} onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && !loading && enviar()}
          placeholder="Pergunte à Rê..."
          style={{ flex: 1, padding: '12px 14px', borderRadius: 22, border: '1.5px solid #E0D8D0', fontSize: 14, color: 'var(--brown)', background: 'var(--cream-light)' }}
        />
        <button onClick={enviar}
          style={{ width: 44, height: 44, borderRadius: '50%', background: input ? 'var(--copper)' : '#E0D8D0', border: 'none', fontSize: 18, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, transition: 'background .2s' }}>
          ➤
        </button>
      </div>
    </div>
  );
}

/* ─── TELA: FOTOS (placeholder premium) ─────────────────── */
function FotosScreen() {
  return (
    <div className="screen">
      <div className="header-grad px-5 pt-12 pb-6">
        <h2 style={{ color: 'var(--cream)', fontSize: 22, fontWeight: 700, margin: 0, marginBottom: 4 }}>Espaço de Fotos 📷</h2>
        <p style={{ color: 'rgba(245,237,227,0.6)', fontSize: 13, margin: 0 }}>Sua transformação visual — privado e seguro</p>
      </div>
      <div className="px-4 py-4 flex flex-col gap-4">
        {/* Linha do tempo mock */}
        {[
          { semana: 'Semana 10 — 12/04', marco: 'Marco 🏆', nota: '10kg a menos! Roupa já cai bem 🎉', cats: ['Marco'] },
          { semana: 'Semana 8 — 29/03', nota: 'Sentindo leveza, barriga reduzindo', cats: ['Semanal'] },
          { semana: 'Semana 4 — 01/03', nota: 'Primeiros 5kg! Enjoo diminuindo', cats: ['Semanal'] },
          { semana: 'Semana 1 — 01/02', nota: 'Início da jornada 🌱', cats: ['Início'] },
        ].map((item, i) => (
          <div key={i} className="card">
            <div className="flex justify-between items-center mb-2">
              <span style={{ fontWeight: 700, color: 'var(--brown)', fontSize: 14 }}>{item.semana}</span>
              {item.cats.map(c => (
                <span key={c} className="pill" style={{ background: c === 'Marco' ? '#FFF8E0' : c === 'Início' ? 'var(--copper-pale)' : '#F5F0EC', color: c === 'Marco' ? '#8A6400' : 'var(--brown-light)', fontSize: 11 }}>{c}</span>
              ))}
            </div>
            {/* Foto placeholder */}
            <div style={{ display: 'flex', gap: 8, marginBottom: 10 }}>
              {['Frente', 'Lado', 'Costas'].map(ang => (
                <div key={ang} style={{ flex: 1, aspectRatio: '3/4', background: `linear-gradient(135deg, #E8DDD4, var(--copper-pale))`, borderRadius: 10, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 4 }}>
                  <span style={{ fontSize: 24 }}>🔒</span>
                  <span style={{ fontSize: 10, color: 'var(--brown-light)', fontWeight: 600 }}>{ang}</span>
                </div>
              ))}
            </div>
            {item.nota && <div style={{ fontSize: 13, color: '#8A7060', fontStyle: 'italic' }}>"{item.nota}"</div>}
          </div>
        ))}

        <button className="btn-primary" style={{ fontSize: 15, padding: 14 }}>+ Adicionar fotos de hoje</button>

        <div style={{ padding: '12px 14px', background: 'var(--copper-pale)', borderRadius: 12, fontSize: 13, color: 'var(--brown-light)', lineHeight: 1.5 }}>
          🔒 Suas fotos são armazenadas de forma criptografada e nunca saem do app. Apenas os <strong>cards de progresso</strong> podem ser compartilhados.
        </div>
      </div>
    </div>
  );
}

/* ─── NAVEGAÇÃO ──────────────────────────────────────────── */
const TABS = [
  { id: 'home', label: 'Home', emoji: '🏠' },
  { id: 'planejador', label: 'Picadinha', emoji: '💉' },
  { id: 'diario', label: 'Diário', emoji: '📔' },
  { id: 'peso', label: 'Peso', emoji: '⚖️' },
  { id: 'rê', label: 'Rê', emoji: '💬' },
];

/* ─── APP ROOT ───────────────────────────────────────────── */
function App() {
  const [tab, setTab] = useState('home');

  const screens = {
    home: <HomeScreen setTab={setTab} />,
    planejador: <PlanejadorScreen />,
    diario: <DiarioScreen />,
    peso: <PesoScreen />,
    rê: <ReScreen />,
    calculadora: <CalculadoraScreen />,
    fotos: <FotosScreen />,
  };

  return (
    <>
      {/* Tela atual */}
      <div style={{ position: 'absolute', inset: 0, bottom: 72 }}>
        {tab === 'rê' ? screens['rê'] : (
          <div className="screen">
            {screens[tab]}
          </div>
        )}
      </div>

      {/* Bottom Nav */}
      <div className="bottom-nav">
        {TABS.map(t => (
          <button key={t.id} className={`nav-btn${tab === t.id ? ' active' : ''}`} onClick={() => setTab(t.id)}>
            <span style={{ fontSize: 22, opacity: tab === t.id ? 1 : 0.45, transition: 'opacity .15s' }}>{t.emoji}</span>
            <span className="label">{t.label}</span>
          </button>
        ))}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
